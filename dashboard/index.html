  function rank(t) {
    var b = bucket(t);
    if (b === "past") return 0;
    if (b === "today") return 1;
    if (t.kind === "issue" && !t.due) return 2; // 열린 이슈
    return 3 + (dayDiff(t.due) || 0) / 100;
  }
  function ddayLabel(t) {
    var b = bucket(t), d = dayDiff(t.due);
    if (b === "past") return { cls: "overdue", txt: (d !== null ? Math.abs(d) + "일 지남" : "지남") };
    if (b === "today") return { cls: "today", txt: "오늘 마감" };
    if (t.due) return { cls: "", txt: "D-" + d };
    return { cls: "", txt: "상시" };
  }
  function countBucket(b) { return activeTodos.filter(function (t) { return bucket(t) === b; }).length; }

  var overdueN = countBucket("past");
  var todayN = countBucket("today");
  var laterN = countBucket("later");

  // ── 칸반 카드 구성 ─────────────────────────────────────────
  //  대기(예정/이슈) · 진행 중(지난+오늘 todo + 멤버 working) · 완료(오늘 마무리 — 없음: 긍정 빈 상태)
  function kanbanModel() {
    var waiting = [], doing = [], done = [];
    todos.forEach(function (t, i) {
      var card = { type: "todo", idx: i, t: t };
      if (t.state === "done") { done.push(card); return; } // 오늘 완료된 할 일 → 완료 열
      if (bucket(t) === "later") waiting.push(card);
      else doing.push(card); // past + today = 지금 흐름
    });
    ((proj && proj.members) || []).forEach(function (m, i) {
      var card = { type: "member", idx: i, m: m };
      if (m.status === "working") doing.push(card);
      else if (m.status === "done") done.push(card); // 완료된 멤버 작업 → 완료 열
      else if (m.status === "waiting") waiting.push(card);
    });
    // 데이터 기반 — done 이 비면(오늘 완료 0건) 렌더 단계에서만 긍정 빈 상태 노출
    return { waiting: waiting, doing: doing, done: done };
  }

  // ============================================================
  // 렌더 조각
  // ============================================================
  function sidebarHTML() {
    var km = kanbanModel();
    var badges = {
      todos: String(activeTodos.length),
      project: String(projectList.length),
      team: staffList.length ? String(staffList.length) : "",
      kanban: String(km.waiting.length + km.doing.length + km.done.length),
      records: String(Object.keys(records.counts || {}).reduce(function (a, k) { return a + (records.counts[k] || 0); }, 0))
    };
    var st = ({ online: "online", working: "working", idle: "idle" })[agent.status] || "offline";
    var sub = !agent.identityLoaded ? "정체성 미입력"
      : (proj && proj.health === "주의") ? "한 곳 주의 · 대체로 순항"
      : proj ? "진행 중" : "대기 중";
    var nav = TABS.map(function (tb) {
      var sel = tb.id === activeTab;
      var badge = "";
      if (tb.id === "home" || (tb.id === "team" && !badges.team)) badge = "";  // 채용 전엔 팀 배지 없음
      else if (tb.id === "project") {
        // 주의 상태는 별도 점 대신 숫자 배지 자체를 경고 톤으로 — 배지가 2개면 숫자 열이 어긋난다
        var warn = proj && proj.health === "주의";
        badge = '<span class="badge' + (warn ? ' warn" title="주의"' : '"') + '>' + badges.project + '</span>';
      } else {
        badge = '<span class="badge">' + esc(badges[tb.id] || "") + '</span>';
      }
      return '<a class="navtab" role="tab" id="tab-' + tb.id + '" href="#' + tb.id + '"' +
        ' aria-selected="' + (sel ? "true" : "false") + '" aria-controls="panel-' + tb.id + '"' +
        (sel ? ' aria-current="page"' : '') + '>' +
        '<span class="ic" aria-hidden="true">' + tb.ic + '</span>' +
        '<span class="lbl">' + esc(tb.label) + '</span>' + badge + '</a>';
    }).join("");

    return '<aside class="sidebar">' +
      '<div class="brand">' +
        '<span class="dot ' + st + '" title="' + (STATUS_LABEL[agent.status] || "상태 미상") + '"></span>' +
        '<span class="biz">' + esc(agent.businessName || "정체성 미입력") +
          '<small>' + esc(sub) + '</small>' +
        '</span>' +
      '</div>' +
      '<nav class="nav" role="tablist" aria-orientation="vertical" aria-label="대시보드 탭">' + nav + '</nav>' +
      '<div class="side-foot">' +
        '<span class="upd-label">갱신 ' + relTime(s.updatedAt) + '</span><span class="spacer"></span>' +
        themeBtn() +
        '<button class="refresh" data-refresh type="button" aria-label="새로고침">' +
          '<span class="ico" aria-hidden="true">↻</span>새로고침</button>' +
      '</div>' +
    '</aside>';
  }

  // 테마 토글 — 기본 라이트, 버튼으로 다크 전환, 선택은 localStorage 기억
  var themePrefs = (typeof G !== "undefined" && G.prefs) ? G.prefs() : null;
  function curTheme() {
    var a = document.documentElement.getAttribute("data-theme");
    if (a === "dark" || a === "light") return a;
    return (typeof matchMedia !== "undefined" && matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  }
  function themeBtn() {
    var dark = curTheme() === "dark";
    return '<button class="refresh" data-theme-toggle type="button" aria-label="' +
      (dark ? "라이트 모드로 전환" : "다크 모드로 전환") + '" title="' + (dark ? "라이트 모드" : "다크 모드") + '">' +
      '<span class="ico" aria-hidden="true">' + (dark ? "☀" : "☾") + '</span></button>';
  }

  // 펼침 리스트 행 (할 일)
  function todoRow(t, gi) {
    var id = "todo-" + gi;
    var dd = ddayLabel(t);
    var isPast = bucket(t) === "past";
    var ov = isPast ? '<span class="ov" aria-hidden="true"></span>' : "";
    var open = openSet[id] ? " open" : "";
    return '<li class="todo' + open + '">' +
      '<button class="todo-row" type="button" data-exp="' + id + '" aria-expanded="' + (openSet[id] ? "true" : "false") + '" aria-controls="' + id + '">' +
        '<span class="kind ' + esc(t.kind) + '">' + esc(KIND_LABEL[t.kind] || t.kind) + '</span>' +
        '<span class="todo-title">' + ov + esc(t.title) + '</span>' +
        '<span class="todo-meta ' + dd.cls + '">' + esc(dd.txt) + '</span>' +
        '<span class="chev" aria-hidden="true">›</span>' +
      '</button>' +
      '<div class="todo-detail" id="' + id + '"><div class="todo-detail-inner">' +
        '<div class="detail-box">' + esc(kindHint(t)) +
          '<div class="src"><code>' + esc(t.source || "") + '</code></div>' +
          '<div class="acts" style="margin-top:var(--g-space-3)">' +
            (t.source ? '<button class="g-btn g-btn--soft g-btn--sm" type="button" data-viewer="' + esc(t.source) + '">보기</button>' +
              '<a class="g-btn g-btn--secondary g-btn--sm" href="' + esc(t.source) + '" target="_blank" rel="noopener" data-goto>파일로 이동 ↗</a>' : '') +
            '<button class="g-btn g-btn--secondary g-btn--sm" type="button" data-copy="' + esc(t.source || "") + '" aria-label="경로 복사">⧉ 복사</button>' +
          '</div>' +
        '</div>' +
      '</div></div>' +
    '</li>';
  }
  function kindHint(t) {
    if (t.kind === "issue") return "고객/운영 이슈예요. 방침을 정해 회신·조치하면 닫혀요.";
    if (bucket(t) === "past") return "기한이 지났어요. 오늘 가장 먼저 확인하면 좋아요.";
    return "리마인더예요. 아래 원본 노트에서 자세한 맥락을 볼 수 있어요.";
  }

  // ── 홈 탭 ──────────────────────────────────────────────────
  function renderHome() {
    var identityMissing = !agent.identityLoaded;
    var hour = 11;
    try { hour = +(s.session.lastActiveAt.split("T")[1].slice(0, 2)); } catch (e) {}
    var greet = hour < 12 ? "좋은 아침이에요" : hour < 17 ? "좋은 오후예요" : "좋은 저녁이에요";

    var activeCount = projectList.filter(function (p) { return !p.done; }).length;
    var doneCount = projectList.filter(function (p) { return p.done; }).length;
    var isWarn = !!(proj && proj.health === "주의");
    var pgProg = proj ? (proj.progress != null ? proj.progress : phaseProgress(proj)) : null;

    // 프로젝트 절 — 전부 데이터 파생(상수 사유 금지). healthReason 있으면 사용, 없으면 생략.
    var projClause;
    if (proj) {
      var stage = ((proj.phase ? proj.phase + " 단계" : "") + (pgProg != null ? "(" + pgProg + "%)" : "")).trim();
      var reason = (isWarn && proj.healthReason) ? (proj.healthReason + " 때문에 ") : "";
      projClause = "‘" + proj.goal + "’은 " + (stage ? stage + "로 진행 중이고, " : "진행 중이고, ") +
        (isWarn ? (reason + "한 곳이 주의예요.") : "순항 중이에요.");
    } else {
      projClause = doneCount ? "진행 중인 프로젝트는 없고, 완료한 프로젝트가 " + doneCount + "건 있어요." : "진행 중인 프로젝트는 아직 없어요.";
    }
    var sentence = identityMissing
      ? "먼저 identity/IDENTITY.md 를 채우고 텔레그램으로 말을 걸어보세요. 그러면 오늘 상황이 여기에 자동으로 채워져요."
      : (overdueN > 0
        ? "지난 일 " + overdueN + "건만 먼저 처리하면 오늘은 가벼워요. " + projClause
        : "오늘은 지난 일 없이 깔끔해요. " + projClause);

    var hero = '<div class="hero">' +
      '<p class="hi">' + esc(greet) + (agent.businessName ? ' <span class="biz-in">' + esc(agent.businessName) + '</span> 님' : '') + '</p>' +
      '<p class="hi-sub">' + esc(sentence) + '</p>' +
    '</div>';

    // KPI 스트립 4칩 (폴드 위) — 데이터 없으면 0 + 안내 서브
    var actN = (today.activities || []).length;
    var recTotal = Object.keys(records.counts || {}).reduce(function (a, k) { return a + (records.counts[k] || 0); }, 0);
    var actSub = "기록 " + (tcounts.notes || 0) + " · 이슈 " + (tcounts.issues || 0) + " · 초안 " + (tcounts.drafts || 0);
    var kpi3 = proj
      ? '<a class="kpi" href="#project"><span class="kpi-k">프로젝트' + (isWarn ? ' <span class="pin warn"></span>' : '') + '</span>' +
          (pgProg != null
            ? '<span class="kpi-v">' + pgProg + '<span class="u">%</span></span>'
            : '<span class="kpi-v" style="font:var(--g-title-2)">' + esc(proj.phase || '진행 중') + '</span>') +
          '<span class="kpi-sub">' + (proj.health ? '<span class="' + (isWarn ? 'wn' : '') + '">' + esc(proj.health) + '</span> · ' : '') + esc(proj.phase || '진행 중') + (proj.phase ? ' 단계' : '') + '</span></a>'
      : '<a class="kpi" href="#project"><span class="kpi-k">프로젝트</span>' +
          '<span class="kpi-v">' + activeCount + '<span class="u">건</span></span>' +
          '<span class="kpi-sub">' + (doneCount ? '완료 ' + doneCount + '건' : '진행 중 없음') + '</span></a>';
    var kpis = '<div class="kpis">' +
      '<a class="kpi" href="#todos"><span class="kpi-k">해야 할 일</span>' +
        '<span class="kpi-v">' + activeTodos.length + '<span class="u">건</span></span>' +
        '<span class="kpi-sub">' + (overdueN > 0
          ? '<span class="od"><span class="odd"></span>지난 ' + overdueN + '건</span> · 오늘 ' + todayN + '건'
          : (activeTodos.length ? '오늘 ' + todayN + '건 · 예정 ' + laterN + '건' : '지금 챙길 일 없음')) + '</span></a>' +
      '<a class="kpi" href="#records"><span class="kpi-k">오늘 활동</span>' +
        '<span class="kpi-v">' + actN + '<span class="u">건</span></span>' +
        '<span class="kpi-sub">' + (actN ? esc(actSub) : '아직 활동 없음') + '</span></a>' +
      kpi3 +
      '<a class="kpi" href="#records"><span class="kpi-k">쌓인 기록</span>' +
        '<span class="kpi-v">' + recTotal + '<span class="u">건</span></span>' +
        '<span class="kpi-sub">' + (recTotal ? '5개 분류 · 최근 ' + (records.recent || []).length + '건' : '아직 기록 없음') + '</span></a>' +
    '</div>';

    // 오늘 챙길 일 (없으면 긍정 빈 상태)
    var HOME_TODO_CAP = 6; // 홈은 글랜스용 — 초과분은 할 일 탭으로 (스캔성 유지)
    var sorted = activeTodos.slice().sort(function (a, b) { return rank(a) - rank(b); });
    var top = sorted.slice(0, HOME_TODO_CAP);
    var restN = sorted.length - top.length;
    var todoCard;
    if (top.length) {
      var todoBody = '<ul class="rows">';
      top.forEach(function (t) { todoBody += todoRow(t, todos.indexOf(t)); });
      todoBody += '</ul>';
      var todoSummary = '<div class="list-summary">지난 <b>' + overdueN + '</b> · 오늘 <b>' + todayN + '</b> · 예정 <b>' + laterN + '</b>' +
        (restN > 0 ? ' · <a href="#todos">외 ' + restN + '건 →</a>' : '') + '</div>';
      todoCard = '<section class="card" aria-labelledby="home-todo-h">' +
        '<h2 class="card-title" id="home-todo-h">오늘 챙길 일 <span class="count">· ' +
          (restN > 0 ? '상위 ' + top.length + ' / ' + sorted.length + '건' : '전체 ' + sorted.length + '건') + '</span>' +
          '<a class="more" href="#todos">할 일 탭 →</a></h2>' + todoBody + todoSummary + '</section>';
    } else {
      todoCard = '<section class="card" aria-labelledby="home-todo-h">' +
        '<h2 class="card-title" id="home-todo-h">오늘 챙길 일</h2>' +
        '<div class="empty"><span class="em">✅</span>지금 챙길 일이 없어요. 리마인더·이슈가 생기면 여기에 모여요.</div></section>';
    }

    // 진행 프로젝트 미니 (필드 결측 방어)
    var projMini;
    if (proj) {
      var metaChips = '';
      if (proj.health) metaChips += '<span class="chip ' + healthChipCls(proj.health) + '">' + esc(proj.health) + '</span>';
      if (proj.phase) metaChips += '<span class="chip accent">' + esc(proj.phase) + ' 단계</span>';
      var bar = (pgProg != null)
        ? '<div class="progress"><div class="progress-track"><div class="progress-fill" style="width:' + pgProg + '%"></div></div><span class="progress-pct">' + pgProg + '%</span></div>' : '';
      projMini = '<section class="card" aria-labelledby="home-proj-h">' +
        '<h2 class="card-title" id="home-proj-h">진행 프로젝트<a class="more" href="#project">자세히 →</a></h2>' +
        '<p class="mini-goal">' + esc(proj.goal) + '</p>' + (metaChips ? '<div class="mini-meta">' + metaChips + '</div>' : '') + bar + '</section>';
    } else {
      projMini = '<section class="card" aria-labelledby="home-proj-h">' +
        '<h2 class="card-title" id="home-proj-h">진행 프로젝트<a class="more" href="#project">프로젝트 탭 →</a></h2>' +
        '<div class="empty"><span class="em">🚀</span>' + (doneCount ? '진행 중인 프로젝트가 없어요. 완료 ' + doneCount + '건은 프로젝트 탭에 있어요.' : '진행 중인 프로젝트가 없어요. 큰 일을 맡기면 팀이 꾸려져요.') + '</div></section>';
    }

    var acts = (today.activities || []).slice(-3).reverse();
    var actBody;
    if (acts.length) {
      actBody = '<ul class="rows timeline">';
      acts.forEach(function (a) {
        actBody += '<li><span class="t-time">' + esc(a.time) + '</span><span class="t-text">' + esc(a.summary) + '</span><span class="t-tag">' + esc(TYPE_LABEL[a.type] || "") + '</span></li>';
      });
      actBody += '</ul>';
    } else {
      actBody = '<div class="empty"><span class="em">📝</span>아직 오늘 활동이 없어요. 텔레그램으로 메모를 던져보세요.</div>';
    }
    var actMini = '<section class="card" aria-labelledby="home-act-h">' +
      '<h2 class="card-title" id="home-act-h">오늘 활동 <span class="count">· 최근</span><a class="more" href="#records">기록 보기 →</a></h2>' + actBody + '</section>';

    // 지금 결정할 것 — 홈의 단일 강조 1건 (지난 일 > 오늘 마감 > 주의 프로젝트, 없으면 표시 안 함)
    var decide = "";
    if (!identityMissing) {
      var dSorted = activeTodos.slice().sort(function (a, b) { return rank(a) - rank(b); });
      var pick = null, pkind = "";
      for (var di = 0; di < dSorted.length; di++) {
        var bb = bucket(dSorted[di]);
        if (bb === "past") { pick = dSorted[di]; pkind = "od"; break; }
        if (!pick && bb === "today") { pick = dSorted[di]; pkind = "today"; }
      }
      if (pick) {
        decide = '<section class="decide' + (pkind === "od" ? ' od' : '') + '" aria-labelledby="decide-h">' +
          '<div class="decide-body"><span class="decide-k" id="decide-h">' + (pkind === "od" ? "지난 일부터" : "오늘 마감") + '</span>' +
          '<p class="decide-t">' + esc(pick.title) + '</p>' +
          '<p class="decide-why">' + (pkind === "od" ? "기한이 지난 일이 오늘을 무겁게 해요 — 이것부터 정리하면 좋아요." : "오늘 안에 처리하면 좋은 일이에요.") + '</p></div>' +
          '<div class="decide-acts">' +
            (pick.source ? '<button class="g-btn g-btn--primary" type="button" data-viewer="' + esc(pick.source) + '">지금 보기</button>' : '') +
            '<a class="g-btn g-btn--ghost" href="#todos">할 일 탭 →</a>' +
          '</div></section>';
      } else if (isWarn) {
        decide = '<section class="decide warn" aria-labelledby="decide-h">' +
          '<div class="decide-body"><span class="decide-k" id="decide-h">프로젝트 점검</span>' +
          '<p class="decide-t">' + esc(proj.goal) + '</p>' +
          (proj.healthReason ? '<p class="decide-why">' + esc(proj.healthReason) + '</p>' : '') + '</div>' +
          '<div class="decide-acts"><a class="g-btn g-btn--primary" href="#project">자세히 보기</a></div></section>';
      }
    }

    var split = '<div class="split"><div>' + todoCard + '</div><div class="stack">' + projMini + actMini + '</div></div>';
    return panelWrap("home", "", hero + decide + kpis + split);
  }

  // ── 할 일 탭 ───────────────────────────────────────────────
  function renderTodos() {
    function bucketBlock(key, label, cls, emptyMsg, emptyEm) {
      var items = todos.map(function (t, i) { return { t: t, i: i }; })
        .filter(function (o) { return o.t.state !== "done" && bucket(o.t) === key; })
        .sort(function (a, b) { return rank(a.t) - rank(b.t); });
      var body;
      if (items.length) {
        body = '<ul class="rows">';
        items.forEach(function (o) { body += todoRow(o.t, o.i); });
        body += '</ul>';
      } else {
        body = '<div class="empty"><span class="em">' + emptyEm + '</span>' + esc(emptyMsg) + '</div>';
      }
      return '<div class="bucket ' + cls + '"><div class="bucket-head">' + esc(label) +
        ' <span class="bn">' + items.length + '건</span></div><div class="card">' + body + '</div></div>';
    }
    var content =
      bucketBlock("past", "지난 (먼저 처리)", "past", "지난 일이 없어요. 깔끔해요.", "✅") +
      bucketBlock("today", "오늘", "today", "오늘 마감할 일이 없어요.", "🧹") +
      bucketBlock("later", "예정 · 열린 이슈", "later", "예정된 일이 없어요.", "📅");
    return panelWrap("todos", "리마인더와 이슈를 기한별로 모았어요. 항목을 누르면 원본 경로가 열려요.", content);
  }

  // ── 프로젝트 탭 (목록 → 상세) ──────────────────────────────
  function renderProject() {
    if (projectView.mode === "detail") {
      var p = null;
      for (var k = 0; k < projectList.length; k++) if (projectList[k].id === projectView.id) { p = projectList[k]; break; }
      if (p) return panelWrap("project", "", projectDetailHTML(p));
      projectView.mode = "list"; // 못 찾으면 목록으로
    }
    return panelWrap("project", "진행 중·완료 프로젝트 목록이에요. 카드를 누르면 단계·팀·산출물 상세로 들어가요.", projectListHTML());
  }

  function healthChipCls(h) { return h === "주의" ? "warn" : (h === "완료" || h === "순항") ? "success" : "accent"; }

  function projectListHTML() {
    var active = projectList.filter(function (p) { return !p.done; });
    var doneP = projectList.filter(function (p) { return p.done; });
    function cardBtn(p) {
      var period = p.done ? (ymd(p.completedAt) + " 완료") : (p.startedAt ? ymd(p.startedAt) + " 시작" : "");
      var healthChip = p.health ? '<span class="chip ' + healthChipCls(p.health) + '">' + esc(p.health) + '</span>' : '';
      var bar = (p.progress != null)
        ? '<div class="progress"><div class="progress-track"><div class="progress-fill" style="width:' + p.progress + '%"></div></div><span class="progress-pct">' + p.progress + '%</span></div>' : '';
      var foot = '<div style="text-align:right;margin-top:var(--g-space-3)"><span class="pc-arrow" aria-hidden="true">' + (p.phase ? esc(p.phase) + ' 단계 · ' : '') + '자세히 ›</span></div>';
      return '<button class="proj-card" type="button" data-project-open="' + esc(p.id) + '">' +
        '<div class="pc-top"><span class="pc-goal">' + esc(p.goal) + '</span>' + healthChip +
          (period ? '<span class="pc-period">' + esc(period) + '</span>' : '') + '</div>' +
        bar + foot + '</button>';
    }
    var actHtml = active.length ? active.map(cardBtn).join("") : '<div class="empty"><span class="em">🚀</span>진행 중인 프로젝트가 없어요. 큰 일을 맡기면 팀이 꾸려져요.</div>';
    var doneHtml = doneP.length ? doneP.map(cardBtn).join("") : '<div class="empty"><span class="em">📁</span>완료한 프로젝트가 아직 없어요.</div>';
    // 완료 카드는 풀폭(1열) 정렬
    return '<div class="stack">' +
      '<section aria-labelledby="pl-a"><h2 class="card-title" id="pl-a">진행 중 <span class="count">· ' + active.length + '건</span></h2><div class="proj-cards">' + actHtml + '</div></section>' +
      '<section aria-labelledby="pl-d"><h2 class="card-title" id="pl-d">완료 <span class="count">· ' + doneP.length + '건</span></h2><div class="proj-cards proj-cards--full">' + doneHtml + '</div></section>' +
      '</div>';
  }

  // notes/projects/<슬러그>/... 에서 슬러그 추출
  function projectSlug(path) { var m = String(path || "").split("notes/projects/")[1]; return m ? m.split("/")[0] : null; }
  // 완료 프로젝트 goal ↔ records.projects 슬러그 매칭 → 산출물 목록
  function matchedOutputs(p) {
    var projs = (records.projects || []); if (!projs.length) return [];
    var bySlug = {};
    projs.forEach(function (o) { var sl = projectSlug(o.path); if (sl) (bySlug[sl] = bySlug[sl] || []).push(o); });
    var slugs = Object.keys(bySlug); if (!slugs.length) return [];
    var tokens = String(p.goal || "").replace(/[^가-힣a-zA-Z0-9]+/g, " ").split(" ").filter(function (t) { return t.length >= 2; });
    // 첫 일치 반환은 "런칭" 같은 공통 토큰이 다른 프로젝트 폴더에 먼저 걸린다(교차 오매칭) —
    // 가장 많은 토큰이 일치하는 슬러그를 고른다.
    var best = null, bestScore = 0;
    for (var i = 0; i < slugs.length; i++) {
      var score = 0;
      for (var j = 0; j < tokens.length; j++) { if (slugs[i].indexOf(tokens[j]) !== -1) score++; }
      if (score > bestScore) { bestScore = score; best = slugs[i]; }
    }
    if (best) return bySlug[best];
    var doneN = projectList.filter(function (x) { return x.done; }).length; // 완료 1개 & 폴더 1개면 그것
    if (doneN === 1 && slugs.length === 1) return bySlug[slugs[0]];
    return [];
  }
  function outListHTML(items) {
    var h = '<ul class="out-list">';
    items.forEach(function (o) {
      h += '<li><span class="of" aria-hidden="true">▤</span><code>' + esc(o.path) + '</code>' +
        '<span class="acts" style="margin-left:auto">' +
          '<button class="g-btn g-btn--soft g-btn--sm" type="button" data-viewer="' + esc(o.path) + '">보기</button>' +
          '<a class="g-btn g-btn--secondary g-btn--sm" href="' + esc(o.path) + '" target="_blank" rel="noopener" data-goto>파일로 이동 ↗</a>' +
          '<button class="g-btn g-btn--secondary g-btn--sm" type="button" data-copy="' + esc(o.path) + '" aria-label="경로 복사">⧉</button>' +
        '</span></li>';
    });
    return h + '</ul>';
  }
  function projectDetailHTML(p) {
    var phases = p.phases || [];
    var curIdx = p.done ? phases.length : phases.indexOf(p.phase);
    var steps = "";
    if (phases.length) {
      steps = '<div class="stepper" role="list" aria-label="진행 단계">';
      phases.forEach(function (ph, i) {
        var cls = p.done ? "past" : ((i === curIdx) ? "active" : (curIdx > -1 && i < curIdx ? "past" : "future"));
        var mk = cls === "past" ? '<span class="mk" aria-hidden="true">✓</span>' : "";
        steps += '<span class="step ' + cls + '" role="listitem">' + mk + esc(ph) + (cls === "active" ? " · 진행" : "") + '</span>';
      });
      steps += '</div>';
    }

    var hasMembers = (p.members || []).length > 0;
    var hasLog = (p.log || []).length > 0;

    // 산출물: 직접 outputs → 없으면 완료 프로젝트는 records.projects 슬러그 매칭
    var outItems = (p.outputs || []), outSource = "direct";
    if (!outItems.length && p.done) { outItems = matchedOutputs(p); outSource = outItems.length ? "matched" : "none"; }
    var outsBlock;
    if (outItems.length) {
      outsBlock = '<div class="sub-h">산출물 · ' + outItems.length + '건' +
        (outSource === "matched" ? ' <span style="font-weight:400;color:var(--g-fg-subtle)">· 기록에서 연결</span>' : '') + '</div>' + outListHTML(outItems);
    } else if (p.done) {
      outsBlock = '<div class="sub-h">산출물</div>' +
        '<div class="empty" style="padding:var(--g-space-5)"><span class="em">🗂️</span>이 프로젝트의 산출물은 <a class="more" href="#records" style="color:var(--g-brand-fg)">기록 탭</a>에서 볼 수 있어요.</div>';
    } else {
      outsBlock = '<div class="sub-h">산출물 · 0건</div><div class="empty" style="padding:var(--g-space-5)"><span class="em">📄</span>아직 산출물이 없어요.</div>';
    }

    // 멤버·로그: 완료+둘 다 없음 → 정직한 한 줄. 그 외엔 섹션 표시.
    var teamLogBlock;
    if (p.done && !hasMembers && !hasLog) {
      teamLogBlock = '<div style="font:var(--g-caption);color:var(--g-fg-subtle);padding:var(--g-space-5) var(--g-space-1) var(--g-space-1)">완료 요약만 보존돼요 — 당시 멤버·진행 로그는 따로 남지 않았어요.</div>';
    } else {
      var mem = "";
      (p.members || []).forEach(function (m) {
        var ms = MSTAT_LABEL[m.status] ? m.status : "waiting";
        mem += '<div class="member"><span class="m-role">' + esc(m.role) + '</span>' +
          '<span class="m-task">' + esc(m.task) + '</span>' +
          '<span class="mstat ' + ms + '">' + esc(MSTAT_LABEL[ms]) + '</span></div>';
      });
      if (!mem) mem = '<div class="empty" style="padding:var(--g-space-5)"><span class="em">🧑‍🤝‍🧑</span>등록된 멤버가 없어요.</div>';
      var log;
      if (hasLog) {
        log = '<ul class="rows timeline">';
        p.log.slice(-3).forEach(function (l) { log += '<li><span class="t-time">' + esc(l.time) + '</span><span class="t-text">' + esc(l.message) + '</span></li>'; });
        log += '</ul>';
      } else {
        log = '<div class="empty" style="padding:var(--g-space-5)"><span class="em">🗒️</span>기록된 로그가 없어요.</div>';
      }
      teamLogBlock = '<div class="sub-h">팀 멤버 · ' + (p.members || []).length + '명</div>' + mem +
        '<div class="sub-h">최근 로그</div>' + log;
    }

    var summaryBlock = p.summary ? '<p class="hi-sub" style="margin-top:0;margin-bottom:var(--g-space-5)">' + esc(p.summary) + '</p>' : '';
    var healthChip = p.health ? '<span class="chip ' + healthChipCls(p.health) + '" title="건강 상태">' + esc(p.health) + '</span>' : '';
    var period = p.done ? (p.completedAt ? '<span class="pc-period" style="margin-left:auto">' + esc(ymd(p.completedAt)) + ' 완료</span>' : '') : '';
    var bar = (p.progress != null)
      ? '<div class="progress" style="margin-bottom:var(--g-space-5)"><div class="progress-track"><div class="progress-fill" style="width:' + p.progress + '%"></div></div><span class="progress-pct">' + p.progress + '%</span></div>' : '';
    var detail = '<section class="card" aria-labelledby="pj-h">' +
      '<button class="back-btn" type="button" data-project-back>‹ 프로젝트 목록</button>' +
      '<div class="proj-top"><h2 class="goal" id="pj-h">' + esc(p.goal) + '</h2>' + healthChip + period + '</div>' +
      summaryBlock + steps + bar +
      outsBlock + teamLogBlock +
    '</section>';
    return '<div class="stack">' + detail + '</div>';
  }

  // 역할명 → 참여 프로젝트 goal (활성 members + history members 매칭). 매칭 안 되면 null.
  function roleRecentGoal(name) {
    if (proj) { var mm = (proj.members || []); for (var i = 0; i < mm.length; i++) if (mm[i].role === name) return proj.goal; }
    var hist = team.history || [];
    for (var h = 0; h < hist.length; h++) { var hm = hist[h].members || []; for (var j = 0; j < hm.length; j++) if (hm[j].role === name) return hist[h].goal; }
    return null;
  }
  // ── 우리 팀 (roster 역할 카드) — 프로젝트 목록 하단에 렌더 ───
  function renderTeam() {
    var roles = rosterRoles;
    roleMap = {};
    if (!roles.length) {
      return panelWrap("team", "", '<section class="card" aria-labelledby="team-h"><h2 class="card-title" id="team-h">우리 팀</h2>' +
        '<div class="empty"><span class="em">🧑‍🤝‍🧑</span>역할군 정보가 아직 없어요. 프로젝트를 시작하면 필요한 역할이 편성돼요.</div></section>');
    }
    // 소집 매칭: 진행 중 프로젝트의 members[].name ↔ staff[].name (설계된 연결키)
    var projLive = (proj && proj.status !== "done") ? proj : null;
    var dutyByName = {};
    if (projLive) (projLive.members || []).forEach(function (m) { if (m.name) dutyByName[m.name] = m; });
    var hired = staffList.length > 0;
    var onDuty = hired ? staffList.filter(function (st) { return dutyByName[st.name]; }).length : 0;

    var head = "";
    if (!hired) {
      head = '<div class="hire-note"><span aria-hidden="true">👋</span><span>아직 팀원을 채용하기 전이에요. ' +
        '파트너에게 <b>"우리 팀 꾸려줘"</b>라고 말하면 내 사업에 맞는 이름·성향·케미를 가진 8명이 채용됩니다. ' +
        '첫 프로젝트를 맡겨도("○○ 기획 진행해줘") 채용부터 자동으로 진행돼요. 이름·성향은 언제든 바꿀 수 있어요.</span></div>';
    } else {
      head = '<div class="team-summary">' + staffList.length + '명 재직 중 · ' +
        ((onDuty && projLive) ? '<b>' + onDuty + '명 소집 중</b> — ' + esc(projLive.goal) : '지금은 전원 대기') + '</div>';
      var allInitial = staffList.every(function (st) { return !(st.avatar && st.avatar.image); });
      if (allInitial) head += '<div class="hint-line">아바타는 기본 이니셜 배지예요 — 파트너에게 "팀원 아바타 만들어줘"라고 하면 캐릭터 이미지로 업그레이드할 수 있어요.</div>';
    }

    var cards = roles.map(function (r, i) {
      var key = "ri-" + i;
      roleMap[key] = r;
      var st = staffForRole(r);
      var duty = (st && dutyByName[st.name]) || null;
      var stateLine;
      if (duty && projLive) {
        var ms = MSTAT_LABEL[duty.status] ? duty.status : "waiting";
        stateLine = '<div class="role-recent">지금 <span class="pj">' + esc(projLive.goal) + '</span> <span class="mstat ' + ms + '">' + esc(MSTAT_LABEL[ms]) + '</span></div>';
      } else {
        var recentGoal = roleRecentGoal(r.name);
        stateLine = recentGoal
          ? '<div class="role-recent">최근 <span class="pj">' + esc(recentGoal) + '</span></div>'
          : '<div class="role-recent none">필요할 때 소집돼요</div>';
      }
      var outBadge = (r.outputsTotal != null) ? '<span class="role-out">산출 <b>' + r.outputsTotal + '</b></span>' : '';
      var who = st
        ? '<div class="staff-top">' + avatarHTML(st, st.name, "lg") +
          '<div class="staff-id"><span class="staff-name">' + esc(st.name) +
          (st.mbti ? ' <span class="mbti">' + esc(st.mbti) + '</span>' : '') + '</span>' +
          '<span class="staff-role">' + esc(r.name) + '</span></div></div>'
        : '<div class="staff-top"><span class="avatar lg vacant" aria-hidden="true">?</span>' +
          '<div class="staff-id"><span class="staff-name muted">채용 대기</span>' +
          '<span class="staff-role">' + esc(r.name) + '</span></div></div>';
      var hint = '<span class="role-more" aria-hidden="true">' + (st ? '직원 카드 ›' : '역할 카드 ›') + '</span>';
      return '<button class="role-card' + ((st || duty) ? '' : ' idle') + '" type="button" data-role="' + key + '"' +
        ' aria-label="' + esc(st ? st.name + ' 직원 상세 보기' : r.name + ' 역할 상세 보기') + '">' +
        who +
        '<div class="role-focus">' + esc(r.focus || "") + (outBadge ? ' ' + outBadge : '') + '</div>' +
        stateLine + hint + '</button>';
    }).join("");

    var grid = '<section class="card" aria-labelledby="team-h"><h2 class="card-title" id="team-h">우리 팀 <span class="count">· ' +
      (hired ? '재직 ' + staffList.length + '명' : '상비 역할 ' + roles.length) + '</span></h2>' +
      '<div class="roster">' + cards + '</div></section>';
    return panelWrap("team",
      hired ? "우리 회사에 재직 중인 팀원들이에요. 카드를 누르면 성향·관계·직무 기준을 볼 수 있어요."
            : "프로젝트를 맡기면 필요한 팀원이 소집돼요.",
      head + grid);
  }
  // 역할 카드 클릭 → 모달: 스태프가 있으면 "{이름} — {역할}" 직원 모달, 없으면 역할 md 모달
  function openRole(key) {
    var r = roleMap[key];
    if (!r) return;
    var st = staffForRole(r);
    var header = "";
    if (st) {
      var rel = (st.relationships || []).map(function (rl) {
        var other = staffById[rl.with];
        var nm = other ? other.name : rl.with;
        return '<div class="rel-line"><span class="chip ' + (rl.type === "tension" ? "warn" : "accent") + '">' +
          (rl.type === "tension" ? "긴장" : "합") + '</span> <b>' + esc(nm) + '</b>' +
          (rl.note ? ' — ' + esc(rl.note) : '') + '</div>';
      }).join("");
      header = '<div class="staff-head">' + avatarHTML(st, st.name, "lg") +
        '<div><div class="staff-name">' + esc(st.name) +
        (st.mbti ? ' <span class="mbti">' + esc(st.mbti) + '</span>' : '') + '</div>' +
        '<div class="staff-role">' + esc(r.name) + '</div></div></div>' +
        (st.style ? '<p class="staff-style">' + esc(st.style) + '</p>' : '') +
        (st.appearance ? '<p class="staff-app">' + esc(st.appearance) + '</p>' : '') +
        (rel ? '<div class="rel-block">' + rel + '</div>' : '');
    } else if (r.focus) {
      header = '<p class="hi-sub" style="margin-top:0;margin-bottom:var(--g-space-5)">' + esc(r.focus) + '</p>';
    }
    var body = r.content
      ? '<div class="md-body">' + renderMarkdown(r.content) + '</div>'
      : '<div class="empty" style="padding:var(--g-space-5)"><span class="em">🧑‍🤝‍🧑</span>이 역할의 상세 설명은 아직 준비되지 않았어요.<br>프로젝트에 편성되면 관점·판단기준이 채워집니다.</div>';
    openModal(st ? st.name + ' — ' + r.name : r.name, header + body);
  }

  // ── 칸반보드 탭 (읽기 전용 3열 · 티켓 클릭 = 모달 상세) ────
  function renderKanban() {
    var m = kanbanModel();
    ticketMap = {};
    var o0 = proj && proj.outputs && proj.outputs[0];
    var projOut = o0 ? (typeof o0 === "string" ? o0 : o0.path) : null;
    function card(c, colKey) {
      var id = "tk-" + colKey + "-" + c.idx;
      if (c.type === "todo") {
        var t = c.t;
        var dd = t.state === "done" ? { cls: "done", txt: "완료" } : ddayLabel(t);
        var ov = (t.state !== "done" && bucket(t) === "past") ? '<span class="ov" aria-hidden="true"></span>' : "";
        var stLabel = t.state === "done" ? "완료" : (bucket(t) === "past" ? "지남" : bucket(t) === "today" ? "오늘" : "예정");
        var stCls = t.state === "done" ? "success" : (bucket(t) === "past" ? "danger" : bucket(t) === "today" ? "accent" : "");
        ticketMap[id] = { title: t.title, type: (KIND_LABEL[t.kind] || t.kind), assignee: "파트너",
          statusChip: '<span class="chip ' + stCls + '">' + esc(stLabel) + '</span>', due: dd.txt, source: t.source || null, related: null };
        return '<button class="kcard clickable" type="button" data-ticket="' + id + '">' +
          '<span class="kcard-head" style="pointer-events:none">' +
            '<span class="kcard-main"><span class="kcard-title">' + ov + esc(t.title) + '</span>' +
              '<span class="kcard-tags"><span class="kind ' + esc(t.kind) + '">' + esc(KIND_LABEL[t.kind]) + '</span>' +
              '<span class="ktag tnum ' + dd.cls + '">' + esc(dd.txt) + '</span></span></span>' +
            '<span class="chev" aria-hidden="true">›</span>' +
          '</span></button>';
      } else {
        var mm = c.m, ms = MSTAT_LABEL[mm.status] ? mm.status : "waiting";
        ticketMap[id] = { title: mm.role + " · " + mm.task, type: "멤버 작업", assignee: mm.role,
          statusChip: '<span class="mstat ' + ms + '">' + esc(MSTAT_LABEL[ms]) + '</span>', due: "-", source: null, related: projOut };
        return '<button class="kcard clickable" type="button" data-ticket="' + id + '">' +
          '<span class="kcard-head" style="pointer-events:none">' +
            '<span class="kcard-main"><span class="kcard-title">' + esc(mm.role) + ' · ' + esc(mm.task) + '</span>' +
              '<span class="kcard-tags"><span class="ktag">멤버 작업</span>' +
              '<span class="mstat ' + ms + '">' + esc(MSTAT_LABEL[ms]) + '</span></span></span>' +
            '<span class="chev" aria-hidden="true">›</span>' +
          '</span></button>';
      }
    }
    function col(label, dotCls, list, key, empty) {
      var body = list.length ? list.map(function (c) { return card(c, key); }).join("")
        : '<div class="kempty"><span class="em">🌱</span>' + esc(empty) + '</div>';
      return '<section class="kcol" aria-label="' + esc(label) + '">' +
        '<div class="kcol-head"><span class="dotc ' + dotCls + '"></span>' + esc(label) +
          '<span class="kn">' + list.length + '</span></div>' +
        '<div class="kcards">' + body + '</div></section>';
    }
    var board = '<div class="kanban">' +
      col("대기", "wait", m.waiting, "w", "대기 중인 카드가 없어요.") +
      col("진행 중", "doing", m.doing, "d", "진행 중인 카드가 없어요.") +
      col("완료 · 오늘", "done", m.done, "c", "오늘 마무리한 카드는 아직 없어요. 진행 중 " + m.doing.length + "건이 순항하고 있어요.") +
    '</div>';
    return panelWrap("kanban", "오늘 일의 흐름을 한눈에 봐요. 읽기 전용이라 드래그는 없고, 티켓을 누르면 상세가 모달로 열려요.", board);
  }

  // ── 기록 탭 (2단: 폴더 토글 트리 | 리딩 페인) ──────────────
  function renderRecords() {
    var tree = records.tree || {};
    var tnotes = tree.notes || {};
    var tprojects = tree.projects || {};
    var slugs = Object.keys(tprojects);
    var recent = (records.recent || []).slice(0, 5);
    var KIND_ICON = { md: "▤", table: "▦" };

    // 전 파일 메타 색인 (경로 → {title,date,kind,folderKey}) — 트리가 folder 를 확정
    var fileMeta = {};
    recent.forEach(function (f) { if (f && f.path && !fileMeta[f.path]) fileMeta[f.path] = { title: f.title, date: f.date, kind: f.kind, fk: recFolderKeyOf(f.path) }; });
    REC_ORDER.forEach(function (k) { (tnotes[k] || []).forEach(function (f) { if (f && f.path) fileMeta[f.path] = { title: f.title, date: f.date, kind: f.kind, fk: k }; }); });
    slugs.forEach(function (sl) { (tprojects[sl] || []).forEach(function (f) { if (f && f.path) fileMeta[f.path] = { title: f.title, date: f.date, kind: f.kind, fk: "proj:" + sl }; }); });

    // 선택 상태: file = 리딩 페인, openFolder = 펼친 폴더(단일·아코디언, null=접힘)
    var curFile = recView.file;
    if (curFile && !fileMeta[curFile] && !contentByPath[curFile]) curFile = null; // 갱신으로 사라진 경로 방어
    var openFolder = recView.folder;
    var selFolder = curFile ? recFolderKeyOf(curFile) : null;

    // ── 좌: 폴더 토글 트리 ──
    // 최근 (출처 라벨 포함) — 노트/산출물 혼재를 라벨로 구분
    var recentHTML = "";
    if (recent.length) {
      recentHTML = '<div class="rec-group"><div class="rec-nav-head">최근</div><ul class="rec-recent">' +
        recent.map(function (f) {
          var sel = f.path === curFile, src = recSrcLabel(recFolderKeyOf(f.path));
          return '<li><button class="rec-recent-row' + (sel ? ' sel' : '') + '" type="button" data-rec-file="' + esc(f.path) + '"' + (sel ? ' aria-current="true"' : '') + '>' +
            '<span class="rec-kind" aria-hidden="true">' + (KIND_ICON[f.kind] || "▤") + '</span>' +
            '<span class="rec-rmain"><span class="rec-name">' + esc(f.title) + '</span>' +
              (src ? '<span class="rec-src">' + esc(src) + '</span>' : '') + '</span>' +
            '<span class="rec-date">' + esc(ymd(f.date)) + '</span></button></li>';
        }).join("") + '</ul></div>';
    }

    // 폴더 행 (헤더 = 토글, 펼치면 하위 파일 인라인)
    function folderRow(key, label, files) {
      var open = openFolder === key;
      var hasSel = !open && selFolder === key; // 접혀 있어도 선택 파일이 이 폴더면 '여기 있음' 표시
      var head = '<button class="rec-nav-item' + (open ? ' open' : '') + (hasSel ? ' has-sel' : '') + '" type="button" data-rec-folder="' + esc(key) + '" aria-expanded="' + (open ? 'true' : 'false') + '">' +
        '<span class="rec-tw" aria-hidden="true">›</span>' +
        '<span class="lbl">' + esc(label) + '</span>' +
        '<span class="cnt">' + files.length + '</span></button>';
      var kids = "";
      if (open) {
        kids = files.length
          ? '<ul class="rec-files" role="group">' + files.map(function (f) {
              var sel = f.path === curFile;
              return '<li><button class="rec-file-row' + (sel ? ' sel' : '') + '" type="button" data-rec-file="' + esc(f.path) + '"' + (sel ? ' aria-current="true"' : '') + '>' +
                '<span class="rec-kind" aria-hidden="true">' + (KIND_ICON[f.kind] || "▤") + '</span>' +
                '<span class="rec-name">' + esc(f.title) + '</span>' +
                '<span class="rec-date">' + esc(ymd(f.date)) + '</span></button></li>';
            }).join("") + '</ul>'
          : '<div class="empty" style="padding:var(--g-space-4) var(--g-space-3)"><span class="em">🗂️</span>아직 기록이 없어요.</div>';
      }
      return '<div class="rec-folder">' + head + kids + '</div>';
    }

    var notesHTML = '<div class="rec-group"><div class="rec-nav-head">노트</div>' +
      REC_ORDER.map(function (k) { return folderRow(k, FOLDER_LABEL[k] || k, tnotes[k] || []); }).join("") + '</div>';
    var projHTML = slugs.length
      ? '<div class="rec-group"><div class="rec-nav-head">프로젝트 산출물</div>' +
          slugs.map(function (sl) { return folderRow("proj:" + sl, sl.replace(/^\d{4}-\d{2}-/, ""), tprojects[sl] || []); }).join("") + '</div>'
      : "";
    var treeInner = recentHTML + notesHTML + projHTML;
    var hasAny = recent.length || slugs.length || REC_ORDER.some(function (k) { return (tnotes[k] || []).length; });
    if (!hasAny) treeInner = '<div class="empty"><span class="em">🗂️</span>아직 쌓인 기록이 없어요.<br>텔레그램에서 파트너에게 말을 걸면 여기에 채워져요.</div>';
    var treeEl = '<aside class="card rec-tree" aria-label="기록 폴더">' + treeInner + '</aside>';

    // ── 우: 리딩 페인 (주인공) — 본문을 모달 없이 그 자리에서 렌더 ──
    var read;
    if (curFile) {
      var entry = contentByPath[curFile] || {};
      var meta = fileMeta[curFile] || {};
      var src = recSrcLabel(meta.fk), dt = meta.date ? ymd(meta.date) : "";
      var metaLine = (src ? esc(src) : "") + (src && dt ? " · " : "") + (dt ? esc(dt) : "");
      var body = entry.table ? tableHTML(entry.table)
        : entry.content ? '<div class="md-body">' + renderMarkdown(entry.content) + '</div>'
        : '<div class="empty"><span class="em">📄</span>이 파일은 미리보기가 준비되지 않았어요.<br>‘파일로 이동’으로 원본을 여세요.</div>';
      read = '<section class="card rec-read" aria-labelledby="rd-h">' +
        '<div class="rec-read-head"><div class="rec-read-id">' +
          '<span class="rec-read-kind" aria-hidden="true">' + (KIND_ICON[meta.kind] || "▤") + '</span>' +
          '<div class="rec-read-tt"><h2 class="rec-read-title" id="rd-h">' + esc(meta.title || entry.title || basename(curFile)) + '</h2>' +
            (metaLine ? '<span class="rec-read-meta">' + metaLine + '</span>' : '') + '</div>' +
        '</div>' +
        '<span class="acts">' +
          '<a class="g-btn g-btn--secondary g-btn--sm" href="' + esc(curFile) + '" target="_blank" rel="noopener" data-goto>파일로 이동 ↗</a>' +
          '<button class="g-btn g-btn--secondary g-btn--sm" type="button" data-copy="' + esc(curFile) + '" aria-label="경로 복사">⧉</button>' +
        '</span></div>' + body + '</section>';
    } else {
      read = '<section class="card rec-read"><div class="empty"><span class="em">📄</span>왼쪽에서 파일을 고르면 여기에 내용이 바로 보여요.</div></section>';
    }

    var content = '<div class="rec-split">' + treeEl + read + '</div>';
    return panelWrap("records", "왼쪽 폴더를 열어 파일을 고르면 내용이 오른쪽에서 바로 열려요.", content);
  }

  // 패널 래퍼
  function panelWrap(id, desc, inner) {
    var tab = TABS.filter(function (t) { return t.id === id; })[0] || {};
    var head;
    if (id === "home") {
      // 홈: 인사 히어로가 최상단 최대 요소가 되도록 타이틀을 13/600 muted 오버라인으로 격하
      head = '<div class="view-head home-head"><span class="view-over">' + esc(tab.label || "") + '</span></div>';
    } else {
      head = '<div class="view-head"><h1 class="view-title">' + esc(tab.label || "") + '</h1>' +
        (desc ? '<p class="view-desc">' + esc(desc) + '</p>' : '') + '</div>';
    }
    return '<section class="view stagger" role="tabpanel" id="panel-' + id + '" aria-labelledby="tab-' + id + '" tabindex="0">' +
      head + inner + '</section>';
  }

  var RENDERERS = { home: renderHome, todos: renderTodos, project: renderProject, team: renderTeam, kanban: renderKanban, records: renderRecords };

  function mainHTML() {
    var top = '<div class="top-refresh"><span class="upd-label">갱신 ' + relTime(s.updatedAt) + '</span>' +
      themeBtn() +
      '<button class="refresh" data-refresh type="button" aria-label="새로고침"><span class="ico" aria-hidden="true">↻</span>새로고침</button></div>';
    var body = (RENDERERS[activeTab] || renderHome)();
    var foot = '<footer>새 소식이 있을 때만 자동으로 갱신해요 · <code>state/dashboard-data.js</code> 를 읽습니다</footer>';
    return '<main class="main"><div class="main-inner">' + top + body + foot + '</div></main>';
  }

  function renderAll() {
    root.innerHTML = '<div class="app">' + sidebarHTML() + mainHTML() + '</div>';
  }

  // ============================================================
  // 라우팅 (해시)
  // ============================================================
  function tabFromHash() {
    var h = (location.hash || "").replace(/^#/, "");
    return RENDERERS[h] ? h : "home";
  }
  function applyHash(focus) {
    var next = tabFromHash();
    closeModal();                                            // 탭 이동 시 열린 모달 닫기
    if (next === "project") projectView = { mode: "list", id: null }; // 프로젝트 재진입은 목록부터
    if (next !== activeTab) { activeTab = next; renderAll(); }
    if (focus) { var p = document.getElementById("panel-" + activeTab); if (p && p.focus) { try { p.focus(); } catch (e) {} } }
  }
  if (typeof window !== "undefined" && window.addEventListener) {
    window.addEventListener("hashchange", function () { applyHash(true); });
  }

  // ============================================================
  // 토스트
  // ============================================================
  var toastEl = document.getElementById("toast");
  var toastTimer = null;
  function toast(msg) {
    if (!toastEl) return;
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 1900);
  }

  // ============================================================
  // 모달 (티켓 상세 · 마크다운 뷰어) — 닫힘=[hidden]→display:none 로 클릭 삼킴 금지
  // ============================================================
  var modalEl = document.getElementById("modal");
  var modalTitleEl = document.getElementById("modal-title");
  var modalBodyEl = document.getElementById("modal-body");
  var lastFocus = null;

  function modalOpen() { return modalEl && !modalEl.hasAttribute("hidden"); }
  function openModal(title, bodyHtml) {
    if (!modalEl) return;
    if (!modalOpen()) lastFocus = (typeof document !== "undefined" && document.activeElement) || null;
    if (modalTitleEl) modalTitleEl.textContent = title || "";
    if (modalBodyEl) modalBodyEl.innerHTML = bodyHtml || "";
    modalEl.removeAttribute("hidden");
    var dlg = modalEl.querySelector ? modalEl.querySelector(".modal") : null;
    if (dlg && dlg.focus) { try { dlg.focus(); } catch (e) {} }
  }
  function closeModal() {
    if (!modalOpen()) return;
    modalEl.setAttribute("hidden", "");
    if (modalBodyEl) modalBodyEl.innerHTML = "";
    if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (e) {} }
    lastFocus = null;
  }
  // 표 데이터(csv/xlsx 임베드) → GYEOL 표 (첫 행 = 헤더)
  function tableHTML(rows) {
    if (!rows || !rows.length) return '<div class="empty"><span class="em">▦</span>표가 비어 있어요.</div>';
    var head = '<tr>' + rows[0].map(function (c) { return '<th>' + esc(c) + '</th>'; }).join("") + '</tr>';
    var body = rows.slice(1).map(function (r) {
      return '<tr>' + r.map(function (c) { return '<td class="g-num">' + esc(c) + '</td>'; }).join("") + '</tr>';
    }).join("");
    return '<div class="tbl-wrap"><table class="rec-table"><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>';
  }
  // 노트 속 링크 → 웹뷰 모달 (일부 사이트는 임베드를 막는다 — 정직 안내 + 새 탭 폴백 상시 제공)
  function openWebview(url) {
    var host = url;
    try { host = new URL(url).host; } catch (e) {}
    openModal(host,
      '<div class="webview-bar"><span class="hint-line" style="margin:0">일부 사이트는 임베드를 막아요 — 화면이 비면 새 탭으로 여세요.</span>' +
      '<a class="g-btn g-btn--secondary g-btn--sm" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">새 탭에서 열기 ↗</a></div>' +
      '<iframe class="webview" src="' + esc(url) + '" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" referrerpolicy="no-referrer" title="웹 미리보기"></iframe>');
  }
  function openViewer(path) {
    var entry = contentByPath[path];
    var title = (entry && entry.title) ? entry.title : basename(path);
    var mdHtml = (entry && entry.table) ? tableHTML(entry.table)
      : (entry && entry.content) ? renderMarkdown(entry.content)
      : '<div class="empty" style="padding:var(--g-space-7) var(--g-space-5)"><span class="em">📄</span>' +
        '이 파일은 미리보기가 준비되지 않았어요.<br>‘파일로 이동’으로 원본을 여세요.<br>' +
        '<span style="color:var(--g-fg-subtle)">텔레그램에서 파트너가 활동하면 자동으로 채워집니다.</span></div>';
    var foot = '<div class="md-foot"><code>' + esc(path) + '</code>' +
      '<a class="g-btn g-btn--secondary g-btn--sm" href="' + esc(path) + '" target="_blank" rel="noopener" data-goto>파일로 이동 ↗</a>' +
      '<button class="g-btn g-btn--secondary g-btn--sm" type="button" data-copy="' + esc(path) + '" aria-label="경로 복사">⧉ 복사</button></div>';
    openModal(title, '<div class="md-body">' + mdHtml + '</div>' + foot);
  }
  function openTicket(id) {
    var tk = ticketMap[id];
    if (!tk) return;
    var rows = "" +
      '<li><span class="tk-k">유형</span><span class="tk-v">' + esc(tk.type) + '</span></li>' +
      '<li><span class="tk-k">담당자</span><span class="tk-v">' + esc(tk.assignee) + '</span></li>' +
      '<li><span class="tk-k">상태</span><span class="tk-v">' + tk.statusChip + '</span></li>' +
      '<li><span class="tk-k">기한</span><span class="tk-v tnum">' + esc(tk.due) + '</span></li>';
    if (tk.source) {
      rows += '<li><span class="tk-k">출처 노트</span><span class="tk-v">' +
        '<div class="tk-src"><code>' + esc(tk.source) + '</code></div>' +
        '<div class="acts" style="margin-top:var(--g-space-3)">' +
          '<button class="g-btn g-btn--soft g-btn--sm" type="button" data-viewer="' + esc(tk.source) + '">보기</button>' +
          '<a class="g-btn g-btn--secondary g-btn--sm" href="' + esc(tk.source) + '" target="_blank" rel="noopener" data-goto>파일로 이동 ↗</a>' +
          '<button class="g-btn g-btn--secondary g-btn--sm" type="button" data-copy="' + esc(tk.source) + '" aria-label="경로 복사">⧉</button>' +
        '</div></span></li>';
    }
    if (tk.related) {
      rows += '<li><span class="tk-k">관련 결과물</span><span class="tk-v">' +
        '<div class="tk-src"><code>' + esc(tk.related) + '</code></div>' +
        '<div class="acts" style="margin-top:var(--g-space-3)"><button class="g-btn g-btn--soft g-btn--sm" type="button" data-viewer="' + esc(tk.related) + '">보기</button></div></span></li>';
    }
    openModal(tk.title, '<ul class="tk-fields">' + rows + '</ul>');
  }

  // ============================================================
  // 이벤트 위임 (읽기 전용 상호작용만)
  // ============================================================
  function onActivate(target) {
    if (!target || !target.closest) return;
    // 모달 닫기 (X 버튼)
    if (target.closest("[data-modal-close]")) { closeModal(); return; }
    // 모달 배경(딤) 클릭 = 닫기 (배경 자체가 target 일 때만)
    if (target.getAttribute && target.getAttribute("data-modal-backdrop") != null) { closeModal(); return; }
    // 테마 토글 (라이트 ↔ 다크)
    var th = target.closest("[data-theme-toggle]");
    if (th) {
      var next = curTheme() === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      if (themePrefs) themePrefs.set("theme", next);
      else try { localStorage.setItem("gyeol", JSON.stringify({ theme: next })); } catch (e) {}
      var tbtns = document.querySelectorAll("[data-theme-toggle]");
      for (var bi = 0; bi < tbtns.length; bi++) {
        tbtns[bi].setAttribute("aria-label", next === "dark" ? "라이트 모드로 전환" : "다크 모드로 전환");
        tbtns[bi].setAttribute("title", next === "dark" ? "라이트 모드" : "다크 모드");
        var tic = tbtns[bi].querySelector(".ico"); if (tic) tic.textContent = next === "dark" ? "☀" : "☾";
      }
      return;
    }
    // 새로고침 — 실제 리로드(상태 파일 재로드)
    var rf = target.closest("[data-refresh]");
    if (rf) { rf.classList.add("spin"); toast("새로고침 중…"); setTimeout(function () { location.reload(); }, 200); return; }
    // 경로 복사
    var cp = target.closest("[data-copy]");
    if (cp) {
      var path = cp.getAttribute("data-copy") || "";
      var done = function () {
        cp.classList.add("done"); var prev = cp.textContent; cp.textContent = "복사됨"; toast("경로를 복사했어요");
        setTimeout(function () { cp.classList.remove("done"); cp.textContent = prev; }, 1400);
      };
      try { if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(path).then(done, done); else done(); }
      catch (e) { done(); }
      return;
    }
    // 마크다운 뷰어 열기 (보기)
    var vw = target.closest("[data-viewer]");
    if (vw) { openViewer(vw.getAttribute("data-viewer") || ""); return; }
    // 칸반 티켓 → 모달 상세
    var tk = target.closest("[data-ticket]");
    if (tk) { openTicket(tk.getAttribute("data-ticket") || ""); return; }
    // 역할 카드 → 모달 (역할 md 전문)
    var rl = target.closest("[data-role]");
    if (rl) { openRole(rl.getAttribute("data-role") || ""); return; }
    // 프로젝트 목록 → 상세
    var po = target.closest("[data-project-open]");
    if (po) { projectView = { mode: "detail", id: po.getAttribute("data-project-open") }; renderAll(); return; }
    var pb = target.closest("[data-project-back]");
    if (pb) { projectView = { mode: "list", id: null }; renderAll(); return; }
    // 기록 탭 폴더 토글 (아코디언 단일 펼침): 열려 있으면 접고, 아니면 펼치며 첫 파일 자동 선택(즉시 본문)
    var recBtn = target.closest("[data-rec-folder]");
    if (recBtn) {
      var fkey = recBtn.getAttribute("data-rec-folder") || "";
      if (recView.folder === fkey) { recView.folder = null; } // 접기 — 리딩 페인은 유지
      else { recView.folder = fkey; var ff = recFirstFile(fkey); if (ff) recView.file = ff; }
      renderAll(); return;
    }
    // 파일 선택 (트리 파일행·최근 항목 공용) → 리딩 페인 교체 + 담긴 폴더 자동 펼침
    var recFile = target.closest("[data-rec-file]");
    if (recFile) {
      var fp = recFile.getAttribute("data-rec-file");
      recView.file = fp;
      var fk = recFolderKeyOf(fp); if (fk) recView.folder = fk;
      renderAll(); return;
    }
    // '파일로 이동'(data-goto) 은 순수 앵커 — 브라우저 기본 동작(새 탭)에 위임
    if (target.closest("[data-goto]")) return;
    // 펼침 토글 (할 일 / 아코디언 공용)
    var ex = target.closest("[data-exp]");
    if (ex) {
      var eid = ex.getAttribute("data-exp");
      var host = ex.closest(".todo, .kcard, .acc");
      if (host) {
        var isOpen = host.classList.toggle("open");
        ex.setAttribute("aria-expanded", isOpen ? "true" : "false");
        if (isOpen) openSet[eid] = 1; else delete openSet[eid];
      }
      return;
    }
  }
  document.addEventListener("click", function (e) {
    // 뷰어 본문 안의 외부 링크는 웹뷰 모달로 (그 외 앵커는 기본 동작)
    var a = e.target && e.target.closest ? e.target.closest("#modal-body .md-body a[href^='http'], .rec-read .md-body a[href^='http']") : null;
    if (a) { e.preventDefault(); openWebview(a.getAttribute("href")); return; }
    onActivate(e.target);
  });
  // 키보드: 좌우/상하 방향키로 탭 이동 (tablist 로빙)
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && modalOpen()) { e.preventDefault(); closeModal(); return; }
    var t = e.target;
    if (t && t.closest && t.closest('[role="tab"]')) {
      var idx = TABS.map(function (x) { return x.id; }).indexOf(activeTab);
      if (e.key === "ArrowDown" || e.key === "ArrowRight") { e.preventDefault(); location.hash = "#" + TABS[(idx + 1) % TABS.length].id; }
      else if (e.key === "ArrowUp" || e.key === "ArrowLeft") { e.preventDefault(); location.hash = "#" + TABS[(idx - 1 + TABS.length) % TABS.length].id; }
      else if (e.key === "Home") { e.preventDefault(); location.hash = "#" + TABS[0].id; }
      else if (e.key === "End") { e.preventDefault(); location.hash = "#" + TABS[TABS.length - 1].id; }
    }
  });

  // ── 부팅 ───────────────────────────────────────────────────
  activeTab = tabFromHash();
  renderAll();

  // "갱신 N초 전" 라벨을 1초마다 갱신 (전체 리로드 없이 표시만 최신화)
  setInterval(function () {
    var label = "갱신 " + relTime(s.updatedAt);
    var els = document.querySelectorAll ? document.querySelectorAll(".upd-label") : [];
    for (var i = 0; i < els.length; i++) els[i].textContent = label;
  }, 1000);

  // 데이터 갱신 감지 — 매 15초 전체 리로드는 스크롤·펼침 상태를 깨서 불편하다는 대표 피드백으로 교체.
  // 데이터 파일만 조용히 다시 읽어(스크립트 재주입) updatedAt 이 실제로 바뀌었을 때만 화면을 새로 그린다.
  function dataSig(d) { d = d || {}; return ((d.status || {}).updatedAt || "") + "|" + ((d.team || {}).updatedAt || ""); }
  var bootSig = dataSig(data);
  function scheduleReload() {
    setTimeout(function () {
      if (modalOpen()) { scheduleReload(); return; }   // 노트 읽는 중엔 건드리지 않는다
      var sc = document.createElement("script");
      sc.src = "../state/dashboard-data.js?v=" + Date.now();
      sc.onload = function () {
        sc.remove();
        if (dataSig(window.DASHBOARD_DATA) !== bootSig) { location.reload(); return; }
        scheduleReload();
      };
      sc.onerror = function () { sc.remove(); scheduleReload(); };
      document.head.appendChild(sc);
    }, 15000);
  }
  scheduleReload();
})();
</script>
</body>
</html>
