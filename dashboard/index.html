<!DOCTYPE html>
<html lang="ko" data-density="compact">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>내 비즈니스 파트너 · 대시보드</title>
<link rel="stylesheet" href="gyeol.tokens.css">
<link rel="stylesheet" href="gyeol.components.css">
<script src="gyeol.js"></script>
<style>
  /* ============================================================
     GYEOL 개편 · 앱 레이어
     ★ 이 파일을 고치기 전에 docs/DASHBOARD_DESIGN.md(디자인 헌법·보존 계약·검증 의무)를 읽을 것.
     - 값을 고르지 않는다: 색·간격·반경·모션·타이포 전부 GYEOL 역할 토큰.
     - 브랜드(파인틸)는 head 스크립트의 G.setBrand() 한 곳에서만 씨앗 지정(인라인 CSS엔 색상 리터럴 0).
     - 밀도는 compact(로컬 대시보드). 본문 가독성 위해 body 계열만 14px 로 상향.
     - 클래스명은 보존(동작·데이터 훅 무변경). 스타일 레시피만 GYEOL 토큰으로 교체.
     ============================================================ */

  /* 조밀 밀도를 유지하되(컨트롤·행·간격은 compact), 한국어 본문만 14px 이상으로.
     타이포 스케일 조정은 토큰 레이어의 정당한 역할이며 UI 코드 하드코딩이 아니다. */
  [data-density="compact"] {
    --g-body:     400 14px/1.6 var(--g-font-sans);
    --g-body-str: 600 14px/1.5 var(--g-font-sans);
  }

  html { -webkit-text-size-adjust: 100%; }
  /* body 는 .g-root 가 배경·글자·기본 폰트를 담당. 여기선 수치 표기만 고정폭으로. */
  body { margin: 0; }
  a { color: inherit; }
  .num, .tnum, .g-num { font-variant-numeric: var(--g-font-numeric); }

  /* ============================================================
     앱 셸 — 모바일 우선: 상단 탭바 / ≥1100px: 좌측 사이드바 고정
     ============================================================ */
  .app { display: flex; flex-direction: column; min-height: 100dvh; }

  /* ── 사이드바 ───────────────────────────────────────────── */
  .sidebar {
    display: flex; flex-direction: column; gap: var(--g-space-3);
    background: var(--g-surface);
    border-bottom: 1px solid var(--g-border);
    padding: var(--g-space-3) var(--g-space-5);
  }
  .brand { display: flex; align-items: center; gap: var(--g-space-3); min-width: 0; }
  .brand .dot { width: 9px; height: 9px; border-radius: var(--g-radius-full); flex: none; }
  .dot.online  { background: var(--g-positive); box-shadow: 0 0 0 3px var(--g-positive-soft); }
  .dot.working { background: var(--g-brand);    box-shadow: 0 0 0 3px var(--g-brand-soft); }
  .dot.idle    { background: var(--g-warning);  box-shadow: 0 0 0 3px var(--g-warning-soft); }
  .dot.offline { background: var(--g-fg-subtle); }
  .brand .biz  { font: var(--g-title-3); letter-spacing: var(--g-track-title); }
  .brand .biz small { display: block; font: var(--g-caption); color: var(--g-positive); letter-spacing: 0; }

  .nav { display: flex; flex-direction: row; gap: var(--g-space-2); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .navtab {
    display: inline-flex; align-items: center; gap: var(--g-space-3);
    text-decoration: none; white-space: nowrap; flex: none;
    font: var(--g-body-str); color: var(--g-fg-muted);
    background: transparent; border: 0; border-radius: var(--g-radius-control);
    padding: var(--g-space-3) var(--g-space-4); cursor: pointer;
    transition: background-color var(--g-motion-tap), color var(--g-motion-tap);
  }
  .navtab:hover { background: var(--g-layer-hover); color: var(--g-fg); }
  .navtab[aria-selected="true"] { background: var(--g-brand-soft); color: var(--g-brand-fg); }
  .navtab .ic { font-size: var(--g-icon); line-height: 1; opacity: .85; }
  .navtab .badge {
    font: var(--g-micro); font-variant-numeric: var(--g-font-numeric);
    min-width: 18px; text-align: center; padding: 1px var(--g-space-3); border-radius: var(--g-radius-full);
    background: var(--g-surface-sunken); color: var(--g-fg-muted);
  }
  .navtab[aria-selected="true"] .badge { background: var(--g-surface); color: var(--g-brand-fg); }
  .navtab .badge.warn { background: var(--g-warning-soft); color: var(--g-warning); }

  .side-foot {
    display: none; margin-top: auto; align-items: center; gap: var(--g-space-3);
    font: var(--g-caption); color: var(--g-fg-subtle);
    padding-top: var(--g-space-3); border-top: 1px solid var(--g-border);
  }
  .side-foot .spacer { flex: 1; }
  .side-foot .upd-label { white-space: nowrap; }
  .refresh {
    display: inline-flex; align-items: center; gap: var(--g-space-2); white-space: nowrap;
    font: var(--g-caption); color: var(--g-fg-muted);
    background: var(--g-surface); border: 1px solid var(--g-border-strong);
    border-radius: var(--g-radius-full); padding: var(--g-space-2) var(--g-space-4) var(--g-space-2) var(--g-space-3);
    cursor: pointer; transition: border-color var(--g-motion-state), color var(--g-motion-state), background-color var(--g-motion-tap);
  }
  .refresh:hover { border-color: var(--g-fg-subtle); color: var(--g-fg); background: var(--g-layer-hover); }
  .refresh .ico { display: inline-block; font-size: var(--g-icon); line-height: 1; }
  .refresh.spin .ico { animation: spin .6s var(--g-ease-out); }
  @keyframes spin { to { transform: rotate(360deg) } }
  .top-refresh { display: flex; align-items: center; gap: var(--g-space-3); font: var(--g-caption); color: var(--g-fg-subtle); }

  /* ── 메인 ───────────────────────────────────────────────── */
  .main { flex: 1; min-width: 0; padding: var(--g-space-7) var(--g-space-5) var(--g-space-10); }
  .main-inner { max-width: 1040px; margin: 0 auto; }

  /* 뷰 전환 */
  .view-head { margin-bottom: var(--g-space-7); }
  .view-title { font: var(--g-title-1); letter-spacing: var(--g-track-title); margin: 0; }
  .view-desc { font: var(--g-caption); color: var(--g-fg-muted); margin: var(--g-space-2) 0 0; }
  .home-head { margin-bottom: var(--g-space-4); }
  .view-over { display: block; font: var(--g-label); color: var(--g-fg-muted); letter-spacing: .06em; text-transform: uppercase; }

  /* ============================================================
     공통 카드/리스트 — .card 는 GYEOL .g-card 와 동일 레시피
     ============================================================ */
  .card {
    background: var(--g-surface); border: var(--g-elev-border);
    border-radius: var(--g-radius-card); padding: var(--g-card-p) var(--g-space-6);
    box-shadow: var(--g-elev-1);
  }
  .stack > * + * { margin-top: var(--g-space-7); }
  .zone + .zone { margin-top: var(--g-space-8); }

  .card-title {
    display: flex; align-items: center; gap: var(--g-space-2);
    font: var(--g-label); color: var(--g-fg-muted); margin: 0 0 var(--g-space-4);
  }
  .card-title .count { color: var(--g-fg-subtle); font-weight: 400; }
  .card-title .more {
    margin-left: auto; font: var(--g-micro); font-weight: 600;
    color: var(--g-brand-fg); text-decoration: none; border-radius: var(--g-radius-1); padding: 2px var(--g-space-2);
  }
  .card-title .more:hover { text-decoration: underline; }

  .rows { list-style: none; margin: 0; padding: 0; }
  .rows > li { border-top: 1px solid var(--g-border); }
  .rows > li:first-child { border-top: none; }
  .list-summary { margin-top: var(--g-space-4); padding-top: var(--g-space-4); border-top: 1px solid var(--g-border);
    font: var(--g-caption); color: var(--g-fg-muted); font-variant-numeric: var(--g-font-numeric); }
  .list-summary b { font-weight: 600; color: var(--g-fg); }
  .list-summary b.od { color: var(--g-critical); }
  .list-summary a { color: var(--g-brand-fg); font-weight: 600; text-decoration: none; }
  .list-summary a:hover { text-decoration: underline; }

  /* 배지/칩 (틴트쌍, 보더 없음) — GYEOL .g-badge 레시피 계승 */
  .kind {
    display: inline-flex; align-items: center;
    font: var(--g-micro); font-weight: 600;
    padding: 2px var(--g-space-3); border-radius: var(--g-radius-full); flex: none;
    background: var(--g-surface-sunken); color: var(--g-fg-muted);
  }
  .kind.issue { background: var(--g-warning-soft); color: var(--g-warning); }

  /* 빈 상태 (박스 없이, 가운데, 긍정 프레이밍) */
  .empty { text-align: center; color: var(--g-fg-subtle); font: var(--g-caption);
    padding: var(--g-space-7) var(--g-space-5); }
  .empty .em { font-size: 22px; display: block; margin-bottom: var(--g-space-2); }
  .empty a { color: var(--g-brand-fg); }

  /* ============================================================
     홈 탭 — 60초 글랜스
     ============================================================ */
  .hero { margin-bottom: var(--g-space-7); }
  .hi { font: var(--g-title-1); letter-spacing: var(--g-track-title); margin: 0; }
  .hi .biz-in { color: var(--g-brand-fg); }
  .hi-sub { font: var(--g-body); color: var(--g-fg-muted); margin: var(--g-space-2) 0 0; max-width: 62ch; }

  /* 지금 결정할 것 — 홈의 단일 강조 (primary 는 이 카드에만) */
  .decide {
    display: flex; align-items: center; gap: var(--g-space-5); flex-wrap: wrap;
    background: var(--g-brand-soft); border: 1px solid var(--g-border);
    border-radius: var(--g-radius-card); padding: var(--g-space-5) var(--g-space-6);
    margin-bottom: var(--g-space-7);
  }
  .decide.od { background: var(--g-critical-soft); }
  .decide.warn { background: var(--g-warning-soft); }
  .decide-body { flex: 1; min-width: 240px; }
  .decide-k { font: var(--g-micro); font-weight: 700; color: var(--g-brand-fg); text-transform: uppercase; letter-spacing: .04em; }
  .decide.od .decide-k { color: var(--g-critical); }
  .decide.warn .decide-k { color: var(--g-warning); }
  .decide-t { font: var(--g-title-2); letter-spacing: var(--g-track-title); margin: var(--g-space-1) 0 0; }
  .decide-why { font: var(--g-caption); color: var(--g-fg-muted); margin: var(--g-space-1) 0 0; }
  .decide-acts { display: flex; gap: var(--g-space-3); align-items: center; }

  /* KPI 스트립 — 카드 4장이 아니라 한 밴드 4칸 (구분선 분할, 시각 무게 강등) */
  .kpis {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 0;
    background: var(--g-surface); border: var(--g-elev-border); border-radius: var(--g-radius-card);
    box-shadow: var(--g-elev-1); overflow: hidden; margin-bottom: var(--g-space-8);
  }
  .kpi {
    display: block; text-align: left; text-decoration: none; color: inherit;
    padding: var(--g-space-4) var(--g-space-5);
    transition: background-color var(--g-motion-tap);
  }
  .kpi:nth-child(even) { border-left: 1px solid var(--g-border); }
  .kpi:nth-child(n+3) { border-top: 1px solid var(--g-border); }
  a.kpi:hover { background: var(--g-layer-hover); }
  a.kpi:active { background: var(--g-layer-press); }
  .kpi-k { display: flex; align-items: center; gap: var(--g-space-2); font: var(--g-micro); font-weight: 600; color: var(--g-fg-muted); letter-spacing: .02em; text-transform: uppercase; }
  .kpi-k .pin { width: 6px; height: 6px; border-radius: var(--g-radius-full); }
  .kpi-k .pin.warn { background: var(--g-warning); }
  .kpi-v { display: block; font: var(--g-title-1); letter-spacing: var(--g-track-title); line-height: 1.15; margin-top: var(--g-space-2); font-variant-numeric: var(--g-font-numeric); }
  .kpi-v .u { font: var(--g-body-str); color: var(--g-fg-muted); margin-left: 2px; }
  .kpi-sub { display: block; font: var(--g-micro); color: var(--g-fg-subtle); margin-top: var(--g-space-2); }
  .kpi-sub .od { color: var(--g-critical); font-weight: 600; }
  .kpi-sub .od .odd { display: inline-block; width: 6px; height: 6px; border-radius: var(--g-radius-full); background: var(--g-critical); margin-right: var(--g-space-2); vertical-align: middle; }
  .kpi-sub .wn { color: var(--g-warning); font-weight: 600; }

  /* 홈 메인 분할 */
  .split { display: grid; grid-template-columns: 1fr; gap: var(--g-space-7); }

  /* 해야 할 일 리스트 행 */
  .todo-row {
    display: flex; align-items: center; gap: var(--g-space-4);
    width: 100%; text-align: left; font: inherit; color: inherit;
    background: transparent; border: 0; cursor: pointer;
    padding: var(--g-space-3) var(--g-space-2); border-radius: var(--g-radius-control);
    transition: background-color var(--g-motion-tap);
  }
  .todo-row:hover { background: var(--g-layer-hover); }
  .todo-row:active { background: var(--g-layer-press); }
  .todo-row .chev { transition: transform var(--g-motion-state); }
  .todo-row:hover .chev { transform: translateX(2px); }
  .todo-title { flex: 1; font: var(--g-body); min-width: 0; }
  .todo-title .ov {
    display: inline-block; width: 6px; height: 6px; border-radius: var(--g-radius-full);
    background: var(--g-critical); margin-right: var(--g-space-2); vertical-align: middle;
  }
  .todo-meta {
    font: var(--g-micro); color: var(--g-fg-subtle); flex: none;
    font-variant-numeric: var(--g-font-numeric); white-space: nowrap; min-width: 62px; text-align: right;
  }
  .todo-meta.overdue { color: var(--g-critical); font-weight: 600; }
  .todo-meta.today   { color: var(--g-brand-fg); font-weight: 600; }
  .chev {
    flex: none; color: var(--g-fg-subtle); font-size: var(--g-icon); line-height: 1;
    transition: transform var(--g-motion-state); transform: rotate(0deg);
  }
  .todo.open .chev, .acc.open .acc-head .chev, .kcard.open .chev { transform: rotate(90deg); }
  .todo-detail, .kcard-body, .acc-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows var(--g-motion-reveal); }
  .todo.open .todo-detail, .kcard.open .kcard-body, .acc.open .acc-body { grid-template-rows: 1fr; }
  .todo-detail-inner, .kcard-body-inner, .acc-body-inner { overflow: hidden; }
  .detail-box {
    margin: 2px var(--g-space-2) var(--g-space-4); padding: var(--g-space-4);
    background: var(--g-surface-sunken); border-radius: var(--g-radius-control);
    font: var(--g-caption); color: var(--g-fg-muted);
  }
  .detail-box .src {
    display: flex; align-items: center; gap: var(--g-space-3);
    margin-top: var(--g-space-3); flex-wrap: wrap;
  }
  .src code {
    font-family: var(--g-font-mono);
    font: var(--g-micro); font-family: var(--g-font-mono); color: var(--g-fg);
    background: var(--g-surface); border: 1px solid var(--g-border);
    border-radius: var(--g-radius-1); padding: 2px var(--g-space-3); word-break: break-all;
  }

  /* 우측 레일 미니카드 */
  .mini-goal { font: var(--g-title-3); letter-spacing: var(--g-track-title); margin: 0 0 var(--g-space-4); }
  .mini-meta { display: flex; align-items: center; gap: var(--g-space-2); flex-wrap: wrap; margin-bottom: var(--g-space-4); }

  /* 타임라인 */
  .timeline > li { display: flex; gap: var(--g-space-4); align-items: baseline; padding: var(--g-space-2); }
  .t-time { font: var(--g-micro); color: var(--g-fg-subtle); flex: none; min-width: 42px; font-variant-numeric: var(--g-font-numeric); }
  .t-text { flex: 1; font: var(--g-caption); color: var(--g-fg); min-width: 0; }
  .t-tag  { font: var(--g-micro); color: var(--g-fg-subtle); flex: none; }

  /* 상태 칩 (health / member) — GYEOL .g-badge 레시피 계승 */
  .chip {
    display: inline-flex; align-items: center;
    font: var(--g-micro); font-weight: 600;
    padding: 2px var(--g-space-3); border-radius: var(--g-radius-full); flex: none;
    background: var(--g-surface-sunken); color: var(--g-fg-muted);
  }
  .chip.warn    { background: var(--g-warning-soft);  color: var(--g-warning); }
  .chip.success { background: var(--g-positive-soft); color: var(--g-positive); }
  .chip.accent  { background: var(--g-brand-soft);    color: var(--g-brand-fg); }
  .chip.danger  { background: var(--g-critical-soft); color: var(--g-critical); }

  /* 진행 바 — GYEOL .g-progress 레시피 계승 */
  .progress { display: flex; align-items: center; gap: var(--g-space-4); }
  .progress-track { flex: 1; height: 8px; background: var(--g-surface-sunken); border-radius: var(--g-radius-full); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--g-brand); border-radius: var(--g-radius-full); transition: width var(--g-motion-sheet); }
  .progress-pct { font: var(--g-caption); font-weight: 600; color: var(--g-brand-fg); font-variant-numeric: var(--g-font-numeric); flex: none; }

  /* ============================================================
     할 일 탭 — 버킷
     ============================================================ */
  .bucket + .bucket { margin-top: var(--g-space-5); }
  .bucket-head {
    display: flex; align-items: center; gap: var(--g-space-2);
    font: var(--g-label); color: var(--g-fg-muted);
    margin-bottom: var(--g-space-2); padding: 0 var(--g-space-2);
  }
  .bucket-head .bn { font: var(--g-micro); color: var(--g-fg-subtle); font-variant-numeric: var(--g-font-numeric); }
  .bucket.past .bucket-head { color: var(--g-critical); }
  .bucket.past .bucket-head .bn { color: var(--g-critical); }

  /* ============================================================
     프로젝트 탭
     ============================================================ */
  .goal { font: var(--g-title-3); margin: 0; }
  .proj-top { display: flex; align-items: center; gap: var(--g-space-4); flex-wrap: wrap; margin-bottom: var(--g-space-5); }
  .stepper { display: flex; flex-wrap: wrap; gap: var(--g-space-2); margin-bottom: var(--g-space-5); }
  .step {
    font: var(--g-micro); font-weight: 500; padding: var(--g-space-2) var(--g-space-4); border-radius: var(--g-radius-full);
    border: 1px solid var(--g-border); color: var(--g-fg-subtle);
  }
  .step.past   { color: var(--g-brand-fg); border-color: var(--g-brand); }
  .step.active { background: var(--g-brand); color: var(--g-fg-on-brand); border-color: var(--g-brand); font-weight: 600; }
  .step .mk { margin-right: var(--g-space-2); }

  .member { display: flex; align-items: center; gap: var(--g-space-4); padding: var(--g-space-3) 2px; }
  .m-role { font: var(--g-body-str); min-width: 64px; flex: none;
    display: inline-flex; align-items: center; }
  .m-of { color: var(--g-fg-muted); font-weight: 400; font: var(--g-micro); margin-left: var(--g-space-2); }
  .m-task { color: var(--g-fg-muted); flex: 1; font: var(--g-caption); min-width: 0; }
  .mstat { font: var(--g-micro); font-weight: 600; padding: 2px var(--g-space-3); border-radius: var(--g-radius-full); flex: none; }
  .mstat.done    { background: var(--g-positive-soft); color: var(--g-positive); }
  .mstat.working { background: var(--g-brand-soft);    color: var(--g-brand-fg); }
  .mstat.waiting { background: var(--g-surface-sunken); color: var(--g-fg-muted); }
  .mstat.blocked { background: var(--g-critical-soft); color: var(--g-critical); }

  .sub-h { font: var(--g-micro); font-weight: 600; color: var(--g-fg-subtle); margin: var(--g-space-5) 2px var(--g-space-1); letter-spacing: .02em; }
  .out-list { list-style: none; margin: 0; padding: 0; }
  .out-list li { display: flex; align-items: center; gap: var(--g-space-3); padding: var(--g-space-2); }
  .out-list .of { font-size: 13px; color: var(--g-brand); flex: none; }
  .out-list code { font-family: var(--g-font-mono); font: var(--g-micro); font-family: var(--g-font-mono); color: var(--g-fg-muted); word-break: break-all; }

  /* 아코디언 (완료 이력) */
  .acc-head {
    display: flex; align-items: center; gap: var(--g-space-4);
    width: 100%; text-align: left; font: inherit; color: inherit;
    background: transparent; border: 0; cursor: pointer; padding: var(--g-space-2);
    border-radius: var(--g-radius-control); transition: background-color var(--g-motion-tap);
  }
  .acc-head:hover { background: var(--g-layer-hover); }
  .acc-title { flex: 1; font: var(--g-body-str); }
  .acc-date { font: var(--g-micro); color: var(--g-fg-subtle); flex: none; font-variant-numeric: var(--g-font-numeric); }
  .acc-box { margin: var(--g-space-2) var(--g-space-2) 2px; padding: var(--g-space-4); background: var(--g-surface-sunken); border-radius: var(--g-radius-control); font: var(--g-caption); color: var(--g-fg-muted); }

  /* 우리 팀 (roster 역할) */
  /* 팀 탭 — 스태프 (아바타 색은 계약 데이터값, 이니셜 글자는 --g-fg-on-brand 토큰) */
  .team-summary { font: var(--g-title-3); letter-spacing: var(--g-track-title); margin-bottom: var(--g-space-3); }
  .team-summary b { color: var(--g-brand-fg); }
  .hint-line { font: var(--g-caption); color: var(--g-fg-subtle); margin-bottom: var(--g-space-5); }
  .hire-note {
    display: flex; gap: var(--g-space-3); align-items: flex-start;
    background: var(--g-brand-soft); border-radius: var(--g-radius-card);
    padding: var(--g-space-5) var(--g-space-6); margin-bottom: var(--g-space-6);
    font: var(--g-body); color: var(--g-fg);
  }
  .avatar {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: var(--g-radius-full);
    color: var(--g-fg-on-brand); font: var(--g-micro); font-weight: 700;
    flex: none; overflow: hidden;
  }
  .avatar.lg { width: 44px; height: 44px; font: var(--g-body-str); }
  .avatar.img { background: var(--g-surface-sunken); }
  .avatar.img img { width: 100%; height: 100%; display: block; object-fit: cover; }
  .avatar.vacant { background: var(--g-surface-sunken); border: 1.5px dashed var(--g-border-strong); color: var(--g-fg-subtle); }
  .staff-top { display: flex; align-items: center; gap: var(--g-space-4); margin-bottom: var(--g-space-3); }
  .staff-id { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .staff-name { font: var(--g-body-str); }
  .staff-name.muted { color: var(--g-fg-subtle); }
  .staff-role { font: var(--g-caption); color: var(--g-fg-muted); }
  .mbti {
    display: inline-block; vertical-align: middle; margin-left: var(--g-space-1);
    font: var(--g-micro); font-weight: 700; letter-spacing: .03em;
    background: var(--g-brand-soft); color: var(--g-brand-fg);
    border-radius: var(--g-radius-full); padding: 1px var(--g-space-3);
  }
  .staff-head { display: flex; align-items: center; gap: var(--g-space-4); margin-bottom: var(--g-space-4); }
  .staff-head .staff-name { font: var(--g-title-3); }
  .staff-style { font: var(--g-body); color: var(--g-fg); margin: 0 0 var(--g-space-3); }
  .staff-app { font: var(--g-caption); color: var(--g-fg-muted); margin: 0 0 var(--g-space-4); }
  .rel-block { display: flex; flex-direction: column; gap: var(--g-space-2); margin-bottom: var(--g-space-5);
    padding: var(--g-space-4) var(--g-space-5); background: var(--g-surface-sunken); border-radius: var(--g-radius-control); }
  .rel-line { font: var(--g-caption); color: var(--g-fg); }
  .rel-line .chip { margin-right: var(--g-space-2); }
  .roster { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--g-space-4); }
  .role-card {
    display: block; width: 100%; text-align: left; font: inherit; color: inherit; cursor: pointer;
    background: var(--g-surface); border: 1px solid var(--g-border); border-radius: var(--g-radius-card);
    padding: var(--g-space-4) var(--g-space-5); transition: border-color var(--g-motion-state), box-shadow var(--g-motion-state), background-color var(--g-motion-tap);
  }
  .role-card:hover { border-color: var(--g-border-strong); background: var(--g-layer-hover); box-shadow: var(--g-elev-1); }
  .role-card.idle { background: var(--g-bg); }
  .role-more { display: block; font: var(--g-micro); font-weight: 600; color: var(--g-brand-fg); margin-top: var(--g-space-3); }
  .role-top { display: flex; align-items: baseline; gap: var(--g-space-2); }
  .role-name { font: var(--g-body-str); }
  .role-out { margin-left: auto; font: var(--g-micro); color: var(--g-fg-subtle); font-variant-numeric: var(--g-font-numeric); }
  .role-out b { color: var(--g-brand-fg); font-weight: 600; }
  .role-focus { font: var(--g-caption); color: var(--g-fg-muted); margin-top: 2px; }
  .role-recent { font: var(--g-micro); color: var(--g-fg-subtle); margin-top: var(--g-space-2); }
  .role-recent .pj { color: var(--g-brand-fg); }
  .role-recent.none { color: var(--g-fg-subtle); }

  /* ============================================================
     칸반보드 탭 — 읽기 전용 3열
     ============================================================ */
  .kanban { display: grid; grid-template-columns: 1fr; gap: var(--g-space-5); }
  .kcol { background: var(--g-surface); border: var(--g-elev-border); border-radius: var(--g-radius-card); padding: var(--g-space-3); display: flex; flex-direction: column; box-shadow: var(--g-elev-1); }
  .kcol-head { display: flex; align-items: center; gap: var(--g-space-2); font: var(--g-label); color: var(--g-fg-muted); padding: var(--g-space-2) var(--g-space-3) var(--g-space-4); }
  .kcol-head .dotc { width: 7px; height: 7px; border-radius: var(--g-radius-full); flex: none; }
  .kcol-head .dotc.wait { background: var(--g-fg-subtle); }
  .kcol-head .dotc.doing { background: var(--g-brand); }
  .kcol-head .dotc.done { background: var(--g-positive); }
  .kcol-head .kn { margin-left: auto; font: var(--g-micro); color: var(--g-fg-subtle); font-variant-numeric: var(--g-font-numeric); background: var(--g-surface-sunken); border-radius: var(--g-radius-full); padding: 1px var(--g-space-3); }
  .kcards { display: flex; flex-direction: column; gap: var(--g-space-2); flex: 1; }
  .kcard { background: var(--g-bg); border: 1px solid var(--g-border); border-radius: var(--g-radius-control); }
  .kcard-head {
    display: flex; align-items: center; gap: var(--g-space-2); width: 100%;
    text-align: left; font: inherit; color: inherit; background: transparent; border: 0;
    cursor: pointer; padding: var(--g-space-4); border-radius: var(--g-radius-control);
    transition: background-color var(--g-motion-tap);
  }
  .kcard-head:hover { background: var(--g-layer-hover); }
  .kcard-main { flex: 1; min-width: 0; }
  .kcard-title { font: var(--g-caption); color: var(--g-fg); display: block; }
  .kcard-title .ov { display: inline-block; width: 6px; height: 6px; border-radius: var(--g-radius-full); background: var(--g-critical); margin-right: var(--g-space-2); vertical-align: middle; }
  .kcard-tags { display: flex; align-items: center; gap: var(--g-space-2); margin-top: var(--g-space-2); }
  .ktag { font: var(--g-micro); color: var(--g-fg-subtle); }
  .ktag.done { color: var(--g-positive); font-weight: 600; }
  .ktag.tnum { font-variant-numeric: var(--g-font-numeric); }
  .ktag.od { color: var(--g-critical); font-weight: 600; }
  .ktag.today { color: var(--g-brand-fg); font-weight: 600; }
  .kcard .chev { align-self: flex-start; margin-top: 2px; }
  .kcard-body .detail-box { margin: 0 var(--g-space-4) var(--g-space-4); }
  .kempty { text-align: center; color: var(--g-fg-subtle); font: var(--g-micro); padding: var(--g-space-8) var(--g-space-3); }
  .kempty .em { font-size: 20px; display: block; margin-bottom: var(--g-space-2); }

  /* ============================================================
     기록 탭 — 2단: 폴더 토글 트리(좌) + 리딩 페인(주인공, 우)
     ============================================================ */
  /* 탭 패널은 스크린리더용 프로그램 포커스 대상 — 시각 링은 상호작용 요소에만 (패널 전체 테두리 방지) */
  .view:focus, .view:focus-visible { outline: none; box-shadow: none; }
  .rec-split { display: grid; grid-template-columns: 1fr; gap: var(--g-space-5); align-items: start; }

  /* 좌: 폴더 트리 — 최근 · 노트 · 프로젝트 산출물을 한 레일에 */
  .rec-tree { padding: var(--g-space-4); display: flex; flex-direction: column; gap: var(--g-space-1); }
  .rec-group + .rec-group { margin-top: var(--g-space-3); padding-top: var(--g-space-3); border-top: 1px solid var(--g-border); }
  .rec-nav-head { font: var(--g-micro); font-weight: 700; color: var(--g-fg-subtle); text-transform: uppercase; letter-spacing: .05em; padding: 0 var(--g-space-3) var(--g-space-2); }

  /* 최근 — 출처(폴더) 라벨을 붙여 노트/산출물 혼재 가독성 문제 해소 */
  .rec-recent { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 1px; }
  .rec-recent-row {
    display: flex; align-items: center; gap: var(--g-space-3); width: 100%; text-align: left;
    font: inherit; color: inherit; background: transparent; border: 0; cursor: pointer;
    border-radius: var(--g-radius-control); padding: var(--g-space-2) var(--g-space-3);
    transition: background-color var(--g-motion-tap), color var(--g-motion-tap);
  }
  .rec-recent-row:hover { background: var(--g-layer-hover); }
  .rec-recent-row.sel { background: var(--g-brand-soft); }
  .rec-recent-row.sel .rec-name, .rec-recent-row.sel .rec-src, .rec-recent-row.sel .rec-kind { color: var(--g-brand-fg); }
  .rec-rmain { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .rec-src { font: var(--g-micro); color: var(--g-fg-subtle); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 폴더 토글 행 (아코디언 — 클릭하면 하위 파일이 인라인으로 펼쳐진다) */
  .rec-folder { display: flex; flex-direction: column; }
  .rec-nav-item {
    display: flex; align-items: center; gap: var(--g-space-2); width: 100%; text-align: left;
    font: var(--g-body-str); color: var(--g-fg-muted); background: transparent; border: 0; cursor: pointer;
    border-radius: var(--g-radius-control); padding: var(--g-space-3);
    transition: background-color var(--g-motion-tap), color var(--g-motion-tap);
  }
  .rec-nav-item:hover { background: var(--g-layer-hover); color: var(--g-fg); }
  .rec-nav-item.open { color: var(--g-fg); }
  .rec-nav-item.has-sel { color: var(--g-brand-fg); }
  .rec-nav-item .lbl { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rec-nav-item .cnt { flex: none; font: var(--g-micro); font-variant-numeric: var(--g-font-numeric); color: var(--g-fg-subtle); }
  .rec-tw { flex: none; color: var(--g-fg-subtle); font-size: var(--g-icon); line-height: 1; transition: transform var(--g-motion-state); }
  .rec-nav-item.open .rec-tw { transform: rotate(90deg); }

  /* 폴더 안 파일 목록 — 들여쓰기로 위계 표현 */
  .rec-files { list-style: none; margin: 0 0 var(--g-space-2); padding: 0 0 0 var(--g-space-5); display: flex; flex-direction: column; gap: 1px; }
  .rec-file-row {
    display: flex; align-items: center; gap: var(--g-space-3); width: 100%; text-align: left;
    font: var(--g-caption); color: var(--g-fg-muted); background: transparent; border: 0; cursor: pointer;
    border-radius: var(--g-radius-control); padding: var(--g-space-2) var(--g-space-3);
    transition: background-color var(--g-motion-tap), color var(--g-motion-tap);
  }
  .rec-file-row:hover { background: var(--g-layer-hover); color: var(--g-fg); }
  .rec-file-row:active { background: var(--g-layer-press); }
  .rec-file-row.sel { background: var(--g-brand-soft); }
  .rec-file-row.sel .rec-name, .rec-file-row.sel .rec-kind { color: var(--g-brand-fg); font-weight: 600; }
  .rec-kind { flex: none; color: var(--g-fg-subtle); font-size: var(--g-icon); line-height: 1; }
  .rec-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rec-date { flex: none; font: var(--g-micro); color: var(--g-fg-subtle); font-variant-numeric: var(--g-font-numeric); }

  /* 우: 리딩 페인 (주인공 — 폭·타이포 우선) */
  .rec-read { padding: var(--g-space-7) var(--g-space-8); min-height: min(60vh, 520px); }
  .rec-read-head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--g-space-5); flex-wrap: wrap; margin-bottom: var(--g-space-6); padding-bottom: var(--g-space-5); border-bottom: 1px solid var(--g-border); }
  .rec-read-id { display: flex; align-items: flex-start; gap: var(--g-space-4); min-width: 0; }
  .rec-read-kind { flex: none; color: var(--g-brand-fg); font-size: var(--g-icon); line-height: 1.4; }
  .rec-read-tt { min-width: 0; }
  .rec-read-title { font: var(--g-title-2); letter-spacing: var(--g-track-title); margin: 0; }
  .rec-read-meta { display: block; font: var(--g-caption); color: var(--g-fg-subtle); margin-top: var(--g-space-2); font-variant-numeric: var(--g-font-numeric); }
  .rec-read .md-body { max-width: 74ch; }
  .rec-read .empty { padding: var(--g-space-9) var(--g-space-5); }

  /* 뷰어 확장: 표 · 웹뷰 (보존) */
  .tbl-wrap { overflow-x: auto; border: 1px solid var(--g-border); border-radius: var(--g-radius-control); }
  .rec-table { border-collapse: collapse; width: 100%; font: var(--g-caption); }
  .rec-table th { text-align: left; font: var(--g-micro); font-weight: 700; color: var(--g-fg-muted);
    background: var(--g-surface-sunken); padding: var(--g-space-3) var(--g-space-4); white-space: nowrap; }
  .rec-table td { padding: var(--g-space-3) var(--g-space-4); border-top: 1px solid var(--g-border); font-variant-numeric: var(--g-font-numeric); }
  .webview-bar { display: flex; align-items: center; justify-content: space-between; gap: var(--g-space-4); margin-bottom: var(--g-space-4); flex-wrap: wrap; }
  .webview { width: 100%; height: min(64vh, 560px); border: 1px solid var(--g-border); border-radius: var(--g-radius-control); background: var(--g-surface); }

  footer { color: var(--g-fg-subtle); font: var(--g-micro); text-align: center; margin-top: var(--g-space-8); }
  footer code { font-family: var(--g-font-mono); }

  /* ============================================================
     모달 (티켓 상세 · 마크다운 뷰어 공용) — 기존 로직 유지, 시각만 토큰화
     ============================================================ */
  .modal-backdrop[hidden] { display: none !important; } /* ★ 필수: 닫힘 = 완전 제거, 클릭 삼킴 금지 */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: var(--g-z-overlay);
    display: flex; align-items: center; justify-content: center; padding: var(--g-space-5);
    background: var(--g-scrim);
  }
  @media (prefers-reduced-motion: no-preference) {
    .modal-backdrop { animation: mfade var(--g-dur-2) var(--g-ease-out); }
    @keyframes mfade { from { opacity: 0 } }
    .modal { animation: mpop var(--g-motion-reveal); }
    @keyframes mpop { from { opacity: 0; transform: translateY(6px) scale(.985) } }
  }
  .modal { background: var(--g-surface-raised); border: var(--g-elev-border); border-radius: var(--g-radius-card);
    width: 100%; max-width: 560px; max-height: 84vh; display: flex; flex-direction: column;
    box-shadow: var(--g-elev-3); }
  .modal:focus { outline: none; }
  .modal-head { display: flex; align-items: center; gap: var(--g-space-4); padding: var(--g-space-5) var(--g-space-6); border-bottom: 1px solid var(--g-border); }
  .modal-title { font: var(--g-title-3); margin: 0; flex: 1; min-width: 0; }
  .modal-x { flex: none; font-size: 16px; line-height: 1; color: var(--g-fg-muted); background: var(--g-surface-sunken); border: 0; border-radius: var(--g-radius-control); width: 30px; height: 30px; cursor: pointer; transition: color var(--g-motion-tap), background-color var(--g-motion-tap); }
  .modal-x:hover { color: var(--g-fg); background: var(--g-layer-press); }
  .modal-body { padding: var(--g-space-5) var(--g-space-6) var(--g-space-6); overflow-y: auto; }

  /* 티켓 상세 필드 */
  .tk-fields { list-style: none; margin: 0 0 var(--g-space-5); padding: 0; }
  .tk-fields li { display: flex; gap: var(--g-space-4); padding: var(--g-space-3) 0; border-top: 1px solid var(--g-border); font: var(--g-caption); }
  .tk-fields li:first-child { border-top: none; }
  .tk-k { flex: none; min-width: 68px; color: var(--g-fg-subtle); }
  .tk-v { flex: 1; min-width: 0; color: var(--g-fg); }
  .tk-src { display: flex; align-items: center; gap: var(--g-space-3); flex-wrap: wrap; }
  .tk-src code { font-family: var(--g-font-mono); font: var(--g-micro); font-family: var(--g-font-mono); color: var(--g-fg-muted); background: var(--g-surface-sunken); border-radius: var(--g-radius-1); padding: 3px var(--g-space-3); word-break: break-all; }

  /* 공용 액션 컨테이너 (버튼 자체는 .g-btn 계열로 마크업에서 채택) */
  .acts { display: flex; align-items: center; gap: var(--g-space-2); flex-wrap: wrap; }
  /* 복사 완료 피드백 — .g-btn 에 .done 이 붙는다(JS) */
  .g-btn.done { --_bg: var(--g-positive-soft); --_fg: var(--g-positive); --_bd: transparent; }

  /* 마크다운 뷰어 */
  .md-body { font: var(--g-body); color: var(--g-fg); }
  .md-body > *:first-child { margin-top: 0; }
  .md-h { margin: var(--g-space-5) 0 var(--g-space-3); font-weight: 600; letter-spacing: var(--g-track-title); line-height: 1.35; }
  .md-h1 { font: var(--g-title-2); } .md-h2 { font: var(--g-title-3); }
  .md-h3, .md-h4, .md-h5, .md-h6 { font: var(--g-body-str); color: var(--g-fg-muted); }
  .md-p { margin: var(--g-space-3) 0; }
  .md-ul, .md-ol { margin: var(--g-space-3) 0; padding-left: 1.3em; }
  .md-ul li, .md-ol li { margin: 3px 0; }
  .md-body code { font-family: var(--g-font-mono); font-size: .92em; background: var(--g-surface-sunken); border-radius: var(--g-radius-1); padding: 1px var(--g-space-2); }
  .md-pre { background: var(--g-surface-sunken); border-radius: var(--g-radius-control); padding: var(--g-space-4); overflow-x: auto; margin: var(--g-space-4) 0; }
  .md-pre code { background: none; padding: 0; }
  .md-table { border-collapse: collapse; width: 100%; margin: var(--g-space-4) 0; font: var(--g-caption); display: block; overflow-x: auto; }
  .md-table th, .md-table td { border: 1px solid var(--g-border); padding: var(--g-space-2) var(--g-space-4); text-align: left; }
  .md-table th { background: var(--g-surface-sunken); font-weight: 600; }
  .md-foot { display: flex; align-items: center; gap: var(--g-space-3); margin-top: var(--g-space-5); padding-top: var(--g-space-4); border-top: 1px solid var(--g-border); flex-wrap: wrap; }
  .md-foot code { font-family: var(--g-font-mono); font: var(--g-micro); font-family: var(--g-font-mono); color: var(--g-fg-subtle); flex: 1; min-width: 0; word-break: break-all; }

  /* ── 프로젝트 목록 카드 (목록 → 상세) ───────────────────── */
  .proj-cards { display: grid; grid-template-columns: 1fr; gap: var(--g-space-4); }
  .proj-card { width: 100%; text-align: left; font: inherit; color: inherit; cursor: pointer;
    background: var(--g-surface); border: var(--g-elev-border); border-radius: var(--g-radius-card);
    padding: var(--g-card-p) var(--g-space-6); box-shadow: var(--g-elev-1);
    transition: border-color var(--g-motion-state), box-shadow var(--g-motion-state); }
  .proj-card:hover { border-color: var(--g-border-strong); box-shadow: var(--g-elev-2); }
  .pc-top { display: flex; align-items: center; gap: var(--g-space-2); margin-bottom: var(--g-space-4); }
  .pc-goal { font: var(--g-title-3); }

  }

  // ── 간단 마크다운 렌더러 (제목·목록·굵게·인라인코드·코드블록·표) ──
  function renderMarkdown(src) {
    var lines = String(src || "").replace(/\r\n/g, "\n").split("\n"), out = [], i = 0;
    function inl(t) {
      t = esc(t);
